<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>English App</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;margin:40px;line-height:1.8}
h1{color:#2c3e50}
table{border-collapse:collapse;width:100%;margin-bottom:25px}
th,td{border:1px solid #ccc;padding:10px}
th{background:#f2f2f2}
button{padding:6px 10px;cursor:pointer}
.jp{color:#555}
select{font-size:18px;margin-bottom:20px;padding:5px}
</style>

<script>
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    speechSynthesis.speak(msg);
}

const verbs = {

have:{meaning:"持つ / 経験する",forms:["have","has","had","had","having"],
patterns:{SV:null,SVO:"I have a car.",SVOO:null,SVOC:"I have him clean the room."}},

make:{meaning:"作る",forms:["make","makes","made","made","making"],
patterns:{SV:null,SVO:"I make a cake.",SVOO:"I make you a cake.",SVOC:"I make him happy."}},

take:{meaning:"取る",forms:["take","takes","took","taken","taking"],
patterns:{SV:null,SVO:"I take a break.",SVOO:null,SVOC:null}},

get:{meaning:"得る / なる",forms:["get","gets","got","gotten","getting"],
patterns:{SV:null,SVO:"I get a ticket.",SVOO:null,SVOC:"I get him ready."}},

do:{meaning:"する",forms:["do","does","did","done","doing"],
patterns:{SV:null,SVO:"I do my homework.",SVOO:null,SVOC:null}},

go:{meaning:"行く",forms:["go","goes","went","gone","going"],
patterns:{SV:"I go.",SVO:null,SVOO:null,SVOC:null}},

come:{meaning:"来る",forms:["come","comes","came","come","coming"],
patterns:{SV:"I come.",SVO:null,SVOO:null,SVOC:null}}

};

window.onload = function(){
const select = document.getElementById("verbSelect");
Object.keys(verbs).forEach(v=>{
  const option = document.createElement("option");
  option.value = v;
  option.textContent = v;
  select.appendChild(option);
});
loadVerb("have");
};

function changeVerb(){
const v = document.getElementById("verbSelect").value;
loadVerb(v);
}

function loadVerb(v){
const data = verbs[v];

document.getElementById("title").innerText = "動詞 " + v + " 学習テンプレート";
document.getElementById("meaning").innerHTML = "<strong>"+v+"</strong>："+data.meaning;
document.getElementById("voice").onclick = function(){speak(v);};

setRow("SV", data.patterns.SV);
setRow("SVO", data.patterns.SVO);
setRow("SVOO", data.patterns.SVOO);
setRow("SVOC", data.patterns.SVOC);

document.getElementById("forms").innerHTML =
"<li>原形："+data.forms[0]+"</li>"+
"<li>三単現："+data.forms[1]+"</li>"+
"<li>過去形："+data.forms[2]+"</li>"+
"<li>過去分詞："+data.forms[3]+"</li>"+
"<li>現在分詞："+data.forms[4]+"</li>";
}

function setRow(type, sentence){
const row = document.getElementById(type);
if(sentence === null){
row.children[1].innerText = "×（この文型は取らない）";
row.children[2].innerText = "—";
row.children[3].innerText = "—";
}else{
row.children[1].innerText = sentence;
row.children[2].innerText = "";
row.children[3].innerHTML = "<button onclick=\"speak('" + sentence + "')\">音声📢</button>";
}
}
</script>

</head>

<body>

<select id="verbSelect" onchange="changeVerb()"></select>

<h1 id="title"></h1>

<h2>1. 動詞情報</h2>
<p id="meaning"></p>
<p>音声 <button id="voice">音声📢</button></p>

<h2>2. 文型（5文型）</h2>

<table>
<tr>
<th>文型</th>
<th>例文</th>
<th>日本語訳</th>
<th>音声</th>
</tr>

<tr id="SV"><td>SV</td><td></td><td class="jp"></td><td></td></tr>
<tr id="SVO"><td>SVO</td><td></td><td class="jp"></td><td></td></tr>
<tr id="SVOO"><td>SVOO</td><td></td><td class="jp"></td><td></td></tr>
<tr id="SVOC"><td>SVOC</td><td></td><td class="jp"></td><td></td></tr>

</table>

<h2>3. 法則</h2>
<ul id="forms"></ul>

</body>
</html>
