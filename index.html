<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Verb Learning Template</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;margin:40px;line-height:1.8}
h1{color:#2c3e50}
table{border-collapse:collapse;width:100%;margin-bottom:25px}
th,td{border:1px solid #ccc;padding:10px}
th{background:#f2f2f2}
button{padding:6px 10px;cursor:pointer}
.jp{color:#555}
select{font-size:18px;margin-bottom:20px;padding:5px}
</style>

<script>
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    speechSynthesis.speak(msg);
}

const verbs = {

have:{
meaning:"持つ / 経験する",
forms:["have","has","had","had","having"],

SV:null,
SVO:["I have a car.","私は車を持っている"],
SVOO:null,
SVOC:["I have him clean the room.","私は彼に部屋を掃除させる"],

exceptions:[
'"have got" = 持っている（口語）',
"完了形で重要（have + 過去分詞）"
],

output:{
SVO:[
"I have a car.",
"She has a dog.",
"We have many books.",
"私は車を持っている",
"彼女は犬を持っている",
"私たちは多くの本を持っている"
],
SVOC:[
"I have him clean the room.",
"She has the children do their homework.",
"They have the employees work overtime.",
"私は彼に部屋を掃除させる",
"彼女は子供たちに宿題をさせる",
"彼らは従業員に残業させる"
],
APP:[
"I have finished my work.",
"I have been studying English for years.",
"Have you ever had sushi?",
"私は仕事を終えた",
"私は何年も英語を勉強している",
"寿司を食べたことがありますか"
]
}
},

make:{
meaning:"作る",
forms:["make","makes","made","made","making"],

SV:null,
SVO:["I make a cake.","私はケーキを作る"],
SVOO:["I make you a cake.","あなたにケーキを作る"],
SVOC:["I make him happy.","彼を幸せにする"],

exceptions:[],

output:{
SVO:[
"I make a cake.",
"She makes dinner.",
"We make plans.",
"私はケーキを作る",
"彼女は夕食を作る",
"私たちは計画を立てる"
]
}
}

};

window.onload=function(){
const sel=document.getElementById("verbSelect");
Object.keys(verbs).forEach(v=>{
let op=document.createElement("option");
op.value=v;
op.textContent=v;
sel.appendChild(op);
});
loadVerb("have");
};

function changeVerb(){
loadVerb(document.getElementById("verbSelect").value);
}

function loadVerb(v){
const d=verbs[v];
if(!d) return;

// タイトル
document.getElementById("title").innerText="動詞 "+v+" 学習テンプレート";

// 動詞情報
document.getElementById("word").innerText=v;
document.getElementById("meaning").innerText=d.meaning;
document.getElementById("voiceWord").onclick=()=>speak(v);

// 法則
setText("f1",d.forms[0]);
setText("f2",d.forms[1]);
setText("f3",d.forms[2]);
setText("f4",d.forms[3]);
setText("f5",d.forms[4]);

// 文型
setRow("SV",d.SV);
setRow("SVO",d.SVO);
setRow("SVOO",d.SVOO);
setRow("SVOC",d.SVOC);

// 例外
const ex = d.exceptions || [];
document.getElementById("exceptions").innerHTML =
ex.length ? ex.map(e=>"<li>"+e+"</li>").join("") : "<li>—</li>";

// アウトプット
setOutput("outSVO_en","outSVO_jp",d.output && d.output.SVO);
setOutput("outSVOC_en","outSVOC_jp",d.output && d.output.SVOC);
setOutput("outAPP_en","outAPP_jp",d.output && d.output.APP);
}

function setText(id,val){
const el=document.getElementById(id);
if(el) el.innerText=val || "";
}

function setRow(id,data){
const row=document.getElementById(id);
if(!row) return;

if(!data){
row.children[1].innerText="×（この文型は取らない）";
row.children[2].innerText="—";
row.children[3].innerText="—";
}else{
row.children[1].innerText=data[0];
row.children[2].innerText=data[1];
row.children[3].innerHTML="<button onclick=\"speak('"+data[0]+"')\">音声📢</button>";
}
}

function setOutput(id_en,id_jp,data){
const en=document.getElementById(id_en);
const jp=document.getElementById(id_jp);

if(!en || !jp) return;

if(!data || data.length < 6){
en.innerHTML="—";
jp.innerHTML="—";
return;
}

en.innerHTML=data.slice(0,3).join("<br>");
jp.innerHTML=data.slice(3,6).join("<br>");
}
</script>

</head>
<body>

<select id="verbSelect" onchange="changeVerb()"></select>

<h1 id="title">動詞 have 学習テンプレート</h1>

<h2>1. 動詞情報</h2>
<p><strong id="word">have</strong>：<span id="meaning">持つ / 経験する</span></p>
<p>音声 <button id="voiceWord">音声📢</button></p>

<h2>2. 文型（5文型）</h2>

<table>
<tr>
<th>文型</th>
<th>例文</th>
<th>日本語訳</th>
<th>音声</th>
</tr>

<tr id="SV">
<td>SV</td>
<td>×（この文型は基本的に使わない）</td>
<td class="jp">—</td>
<td>—</td>
</tr>

<tr id="SVO">
<td>SVO</td>
<td></td>
<td class="jp"></td>
<td></td>
</tr>

<tr id="SVOO">
<td>SVOO</td>
<td>×（この文型は取らない）</td>
<td class="jp">—</td>
<td>—</td>
</tr>

<tr id="SVOC">
<td>SVOC</td>
<td></td>
<td class="jp"></td>
<td></td>
</tr>

</table>

<h2>3. 法則</h2>
<ul>
<li>原形：<span id="f1"></span> <button onclick="speak(document.getElementById('f1').innerText)">音声📢</button></li>
<li>三人称単数現在：<span id="f2"></span> <button onclick="speak(document.getElementById('f2').innerText)">音声📢</button></li>
<li>過去形：<span id="f3"></span> <button onclick="speak(document.getElementById('f3').innerText)">音声📢</button></li>
<li>過去分詞：<span id="f4"></span> <button onclick="speak(document.getElementById('f4').innerText)">音声📢</button></li>
<li>現在分詞：<span id="f5"></span> <button onclick="speak(document.getElementById('f5').innerText)">音声📢</button></li>
</ul>

<h2>4. 例外</h2>
<ul id="exceptions"></ul>

<h2>5. アウトプット練習（全文型）</h2>

<table>
<tr>
<th>文型</th>
<th>例文</th>
<th>日本語訳</th>
<th>音声</th>
</tr>

<tr>
<td>SVO</td>
<td id="outSVO_en"></td>
<td class="jp" id="outSVO_jp"></td>
<td></td>
</tr>

<tr>
<td>SVOC</td>
<td id="outSVOC_en"></td>
<td class="jp" id="outSVOC_jp"></td>
<td></td>
</tr>

<tr>
<td>応用</td>
<td id="outAPP_en"></td>
<td class="jp" id="outAPP_jp"></td>
<td></td>
</tr>

</table>

</body>
</html>
