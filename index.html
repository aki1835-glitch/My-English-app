<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語動詞 学習テンプレート</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#5b8dee;--accent2:#e8a87c;--text:#e8eaf0;--muted:#7a7f99;--border:#2e3248;--good:#4caf7d;--bad:#e05f5f;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;padding:0 0 60px;}
  .header{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--border);padding:20px 24px 0;position:sticky;top:0;z-index:50;}
  .header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding-bottom:14px;}
  .logo{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--accent);letter-spacing:.02em;white-space:nowrap;}
  .logo em{font-style:italic;color:var(--accent2);}
  .progress-bar-wrap{background:var(--surface2);border-radius:99px;height:6px;flex:1;min-width:80px;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease;width:0%;}
  .progress-label{font-size:.7rem;color:var(--muted);white-space:nowrap;}
  .nav-area{max-width:860px;margin:0 auto;padding:0 24px;}
  .cat-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:0;}
  .cat-tab{background:transparent;border:1px solid var(--border);border-radius:8px 8px 0 0;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.08em;padding:7px 14px;text-transform:uppercase;transition:background .18s,color .18s,border-color .18s;white-space:nowrap;}
  .cat-tab:hover{border-color:var(--accent);color:var(--accent);}
  .cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .verb-grid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:12px 14px;}
  .verb-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .verb-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;padding:6px 13px;transition:background .15s,border-color .15s,transform .1s;}
  .verb-btn:hover{border-color:var(--accent);background:#1e2235;transform:translateY(-1px);}
  .verb-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pager{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .pager-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:.85rem;padding:6px 14px;transition:background .15s,border-color .15s;font-family:'DM Sans',sans-serif;}
  .pager-btn:hover:not(:disabled){border-color:var(--accent);background:#1e2235;}
  .pager-btn:disabled{opacity:.3;cursor:default;}
  .pager-info{font-size:.75rem;color:var(--muted);min-width:54px;text-align:center;}
  .main{max-width:860px;margin:0 auto;padding:28px 20px 0;}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .section-header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .section-num{width:22px;height:22px;background:var(--accent);border-radius:50%;font-size:.68rem;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
  .section-num.pv{background:var(--accent2);}
  .section-title{font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  .section-body{padding:18px;}
  .verb-hero{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .verb-word{font-family:'DM Serif Display',serif;font-size:2.8rem;color:var(--accent);line-height:1;}
  .verb-meaning{color:var(--muted);font-size:.88rem;margin-top:4px;}
  .speak-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;padding:7px 11px;transition:background .2s,transform .15s;display:flex;align-items:center;gap:5px;}
  .speak-btn:hover{background:var(--accent);border-color:var(--accent);transform:scale(1.04);}
  .forms-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .form-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:border-color .2s,background .2s;}
  .form-chip:hover{border-color:var(--accent);background:#1e2235;}
  .form-chip-label{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  .form-chip-val{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.05rem;color:var(--accent2);}
  .patterns-table{width:100%;border-collapse:collapse;}
  .patterns-table th{text-align:left;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);}
  .patterns-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.86rem;}
  .patterns-table tr:last-child td{border-bottom:none;}
  .patterns-table tr:hover td{background:var(--surface2);}
  .badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:.7rem;font-weight:500;letter-spacing:.05em;}
  .badge-yes{background:rgba(91,141,238,.15);color:var(--accent);border:1px solid rgba(91,141,238,.3);}
  .badge-no{background:rgba(224,95,95,.1);color:var(--bad);border:1px solid rgba(224,95,95,.2);}
  .jp-text{color:var(--muted);font-size:.8rem;margin-top:3px;}
  .exception-list{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .exception-list li{background:rgba(232,168,124,.08);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:8px 13px;font-size:.83rem;color:var(--accent2);}
  .output-group{margin-bottom:20px;}
  .output-group:last-child{margin-bottom:0;}
  .output-group-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .output-group-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .sentence-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .sentence-row:last-child{border-bottom:none;}
  .sentence-texts{flex:1;}
  .sentence-en{font-size:.9rem;color:var(--text);}
  .sentence-jp{font-size:.76rem;color:var(--muted);margin-top:3px;}
  /* phrasal verbs in section 6 */
  .pv-list{display:flex;flex-direction:column;gap:14px;}
  .pv-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .pv-item-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
  .pv-phrase{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.15rem;color:var(--accent2);}
  .pv-meaning-tag{font-size:.75rem;color:var(--muted);margin-left:4px;}
  .pv-examples{padding:10px 14px;display:flex;flex-direction:column;gap:7px;}
  .pv-ex{display:flex;align-items:flex-start;gap:8px;}
  .pv-ex-texts{flex:1;}
  .pv-ex-en{font-size:.86rem;color:var(--text);}
  .pv-ex-jp{font-size:.74rem;color:var(--muted);margin-top:2px;}
  /* quiz */
  .quiz-question{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;}
  .quiz-q-label{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .quiz-q-text{font-size:.96rem;color:var(--text);line-height:1.6;}
  .blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--accent);margin:0 4px;color:transparent;user-select:none;}
  .blank.revealed{color:var(--accent2);border-color:var(--accent2);}
  .quiz-jp{font-size:.78rem;color:var(--muted);margin-top:6px;}
  .quiz-options{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .quiz-opt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--text);cursor:pointer;transition:background .18s,border-color .18s,transform .1s;}
  .quiz-opt:hover:not(:disabled){border-color:var(--accent);background:#1e2235;transform:translateY(-1px);}
  .quiz-opt:disabled{cursor:default;opacity:.7;}
  .quiz-opt.correct{background:rgba(76,175,125,.15);border-color:var(--good);color:var(--good);}
  .quiz-opt.wrong{background:rgba(224,95,95,.12);border-color:var(--bad);color:var(--bad);}
  .quiz-feedback{font-size:.8rem;padding:8px 13px;border-radius:8px;margin-bottom:10px;display:none;}
  .quiz-feedback.show{display:block;}
  .quiz-feedback.ok{background:rgba(76,175,125,.1);color:var(--good);border:1px solid rgba(76,175,125,.2);}
  .quiz-feedback.ng{background:rgba(224,95,95,.08);color:var(--bad);border:1px solid rgba(224,95,95,.2);}
  .quiz-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .btn-primary{background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;padding:9px 18px;transition:opacity .2s,transform .15s;}
  .btn-primary:hover{opacity:.88;transform:translateY(-1px);}
  .btn-secondary{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:9px 18px;transition:border-color .2s,color .2s;}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .score-display{display:flex;align-items:center;gap:7px;font-size:.76rem;color:var(--muted);margin-left:auto;}
  .score-num{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--accent2);}
  @media(max-width:580px){.verb-word{font-size:2rem;}.patterns-table th:nth-child(3),.patterns-table td:nth-child(3){display:none;}.section-body{padding:14px;}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">Verb<em>Lab</em></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">Quiz: 0/0</div>
  </div>
  <div class="nav-area">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="verb-grid-wrap">
      <div class="verb-grid" id="verbGrid"></div>
      <div class="pager">
        <button class="pager-btn" id="prevBtn">← 前</button>
        <span class="pager-info" id="pagerInfo"></span>
        <button class="pager-btn" id="nextBtn">次 →</button>
      </div>
    </div>
  </div>
</header>
<main class="main">
  <div class="section" style="animation-delay:.04s">
    <div class="section-header"><div class="section-num">1</div><div class="section-title">動詞情報</div></div>
    <div class="section-body">
      <div class="verb-hero">
        <div><div class="verb-word" id="verbWord"></div><div class="verb-meaning" id="verbMeaning"></div></div>
        <button class="speak-btn" id="speakWordBtn">🔊 発音を聞く</button>
      </div>
      <div class="forms-grid" id="formsGrid"></div>
    </div>
  </div>
  <div class="section" style="animation-delay:.08s">
    <div class="section-header"><div class="section-num">2</div><div class="section-title">5文型</div></div>
    <div class="section-body" style="padding:0">
      <table class="patterns-table">
        <thead><tr><th>文型</th><th>例文</th><th>音声</th></tr></thead>
        <tbody id="patternsBody"></tbody>
      </table>
    </div>
  </div>
  <div class="section" style="animation-delay:.12s">
    <div class="section-header"><div class="section-num">3</div><div class="section-title">例外・注意点</div></div>
    <div class="section-body"><ul class="exception-list" id="exceptionList"></ul></div>
  </div>
  <div class="section" style="animation-delay:.16s">
    <div class="section-header"><div class="section-num">4</div><div class="section-title">アウトプット練習</div></div>
    <div class="section-body" id="outputBody"></div>
  </div>
  <div class="section" style="animation-delay:.20s">
    <div class="section-header"><div class="section-num pv">5</div><div class="section-title">句動詞</div></div>
    <div class="section-body"><div class="pv-list" id="pvList"></div></div>
  </div>
  <div class="section" style="animation-delay:.24s">
    <div class="section-header">
      <div class="section-num">6</div><div class="section-title">クイズ</div>
      <div class="score-display"><span>正解</span><span class="score-num" id="scoreNum">0</span><span>/</span><span id="scoreDen">0</span></div>
    </div>
    <div class="section-body">
      <div class="quiz-question">
        <div class="quiz-q-label">空欄に入る動詞の形を選んでください</div>
        <div class="quiz-q-text" id="quizText"></div>
        <div class="quiz-jp" id="quizJp"></div>
      </div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-controls">
        <button class="btn-primary" id="nextQuizBtn">次の問題 →</button>
        <button class="btn-secondary" id="resetQuizBtn">リセット</button>
      </div>
    </div>
  </div>
</main>
<script>
const VERBS={
  be:{meaning:"〜である / いる / ある",forms:{"原形":"be","三単現":"is","過去形":"was/were","過去分詞":"been","現在分詞":"being"},patterns:{SV:{en:"She is here.",jp:"彼女はここにいる。"},SVO:null,SVOO:null,SVOC:{en:"He is a doctor.",jp:"彼は医者だ。"}},exceptions:["am/is/are（現在）、was/were（過去）と不規則変化","受動態・進行形で助動詞として使われる"],output:{"SV":[{en:"She is here.",jp:"彼女はここにいる。"},{en:"They were at school.",jp:"彼らは学校にいた。"},{en:"The keys are on the table.",jp:"鍵はテーブルの上にある。"}],"SVOC":[{en:"He is a doctor.",jp:"彼は医者だ。"},{en:"The weather is beautiful today.",jp:"今日の天気は素晴らしい。"},{en:"I am happy.",jp:"私は幸せだ。"}]},pv:[{phrase:"be up to",meaning:"〜をたくらんでいる / 〜次第だ",examples:[{en:"What are you up to?",jp:"何をしているの？"},{en:"It's up to you.",jp:"あなた次第だ。"}]},{phrase:"be into",meaning:"〜に夢中だ",examples:[{en:"She is really into yoga.",jp:"彼女はヨガに夢中だ。"},{en:"Are you into music?",jp:"音楽が好きですか？"}]},{phrase:"be over",meaning:"終わっている",examples:[{en:"The meeting is over.",jp:"会議は終わった。"},{en:"It's all over.",jp:"すべて終わった。"}]}]},
  have:{meaning:"持つ / 経験する",forms:{"原形":"have","三単現":"has","過去形":"had","過去分詞":"had","現在分詞":"having"},patterns:{SV:null,SVO:{en:"I have a car.",jp:"私は車を持っている。"},SVOO:null,SVOC:{en:"I have him clean the room.",jp:"私は彼に部屋を掃除させる。"}},exceptions:['"have got" = 持っている（口語）',"完了形で重要：have + 過去分詞","使役動詞：have + O + 動詞原形"],output:{"SVO":[{en:"I have a car.",jp:"私は車を持っている。"},{en:"She has a dog.",jp:"彼女は犬を持っている。"},{en:"We have many books.",jp:"私たちは多くの本を持っている。"}],"応用（完了形）":[{en:"I have finished my work.",jp:"私は仕事を終えた。"},{en:"I have been studying English for years.",jp:"私は何年も英語を勉強している。"},{en:"Have you ever had sushi?",jp:"寿司を食べたことがありますか？"}]},pv:[{phrase:"have on",meaning:"着ている / 予定がある",examples:[{en:"She has a red coat on.",jp:"彼女は赤いコートを着ている。"},{en:"Do you have anything on tonight?",jp:"今夜何か予定がありますか？"}]},{phrase:"have out",meaning:"取り出す / はっきり話し合う",examples:[{en:"Let's have it out.",jp:"はっきり話し合いましょう。"},{en:"She had her tooth out.",jp:"彼女は歯を抜いた。"}]},{phrase:"have over",meaning:"（人を）招待する",examples:[{en:"We had friends over for dinner.",jp:"夕食に友人を招いた。"},{en:"Let's have them over.",jp:"彼らを招待しましょう。"}]}]},
  do:{meaning:"する / 行う",forms:{"原形":"do","三単現":"does","過去形":"did","過去分詞":"done","現在分詞":"doing"},patterns:{SV:null,SVO:{en:"I do my homework.",jp:"私は宿題をする。"},SVOO:null,SVOC:null},exceptions:["助動詞として疑問文・否定文を作る","do well / do badly = うまくいく・うまくいかない"],output:{"SVO":[{en:"I do my homework.",jp:"私は宿題をする。"},{en:"She does yoga every morning.",jp:"彼女は毎朝ヨガをする。"},{en:"We did our best.",jp:"私たちは最善を尽くした。"}],"応用":[{en:"Do you speak English?",jp:"あなたは英語を話しますか？"},{en:"I don't know the answer.",jp:"私は答えを知らない。"},{en:"She did well on the test.",jp:"彼女はテストでよくできた。"}]},pv:[{phrase:"do away with",meaning:"廃止する / 取り除く",examples:[{en:"They did away with the old rule.",jp:"彼らは古いルールを廃止した。"},{en:"Let's do away with this custom.",jp:"この慣習をなくしましょう。"}]},{phrase:"do up",meaning:"修繕する / 飾る / 締める",examples:[{en:"They did up the old house.",jp:"彼らは古い家を修繕した。"},{en:"Do up your shoelaces.",jp:"靴ひもを結んで。"}]},{phrase:"do without",meaning:"〜なしで済ます",examples:[{en:"I can't do without coffee.",jp:"コーヒーなしでは過ごせない。"},{en:"We'll have to do without it.",jp:"それなしでやっていかなければならない。"}]}]},
  make:{meaning:"作る / 〜にする",forms:{"原形":"make","三単現":"makes","過去形":"made","過去分詞":"made","現在分詞":"making"},patterns:{SV:null,SVO:{en:"I make a cake.",jp:"私はケーキを作る。"},SVOO:{en:"I make you a cake.",jp:"あなたにケーキを作る。"},SVOC:{en:"I make him happy.",jp:"彼を幸せにする。"}},exceptions:["使役動詞：make + O + 動詞原形（強制）","make it = うまくやる・間に合う"],output:{"SVO":[{en:"I make a cake.",jp:"私はケーキを作る。"},{en:"She makes dinner every day.",jp:"彼女は毎日夕食を作る。"},{en:"We make plans together.",jp:"私たちは一緒に計画を立てる。"}],"SVOC":[{en:"I make him happy.",jp:"私は彼を幸せにする。"},{en:"The news made her sad.",jp:"そのニュースは彼女を悲しくさせた。"},{en:"Hard work makes you stronger.",jp:"努力はあなたを強くする。"}]},pv:[{phrase:"make up",meaning:"作り上げる / 仲直りする / 占める",examples:[{en:"She made up a story.",jp:"彼女は話を作り上げた。"},{en:"They made up after the fight.",jp:"口論の後仲直りした。"}]},{phrase:"make out",meaning:"理解する / うまくやる",examples:[{en:"I can't make out what he said.",jp:"彼が言ったことが理解できない。"},{en:"How did you make out?",jp:"どうだった？"}]},{phrase:"make up for",meaning:"埋め合わせる",examples:[{en:"I'll make up for lost time.",jp:"失った時間を取り戻す。"},{en:"Nothing can make up for it.",jp:"何もそれを埋め合わせることはできない。"}]}]},

  take:{meaning:"取る / 連れて行く / かかる",forms:{"原形":"take","三単現":"takes","過去形":"took","過去分詞":"taken","現在分詞":"taking"},patterns:{SV:null,SVO:{en:"I take a bus.",jp:"私はバスに乗る。"},SVOO:{en:"I take him a message.",jp:"彼にメッセージを持っていく。"},SVOC:null},exceptions:["It takes + 時間 = 〜の時間がかかる","take + O + to場所 = Oを〜へ連れて行く"],output:{"SVO":[{en:"I take a bus to work.",jp:"私はバスで通勤する。"},{en:"She took a photo.",jp:"彼女は写真を撮った。"},{en:"He takes a walk every evening.",jp:"彼は毎晩散歩する。"}],"応用":[{en:"It takes two hours to get there.",jp:"そこに着くのに2時間かかる。"},{en:"She took me to the hospital.",jp:"彼女は私を病院に連れて行った。"},{en:"Take your time.",jp:"ゆっくりどうぞ。"}]},pv:[{phrase:"take off",meaning:"離陸する / 脱ぐ / 急成長する",examples:[{en:"The plane takes off at noon.",jp:"飛行機は正午に離陸する。"},{en:"Her career took off quickly.",jp:"彼女のキャリアは急成長した。"}]},{phrase:"take on",meaning:"引き受ける / 雇う",examples:[{en:"He took on a new challenge.",jp:"彼は新たな挑戦を引き受けた。"},{en:"We are taking on new staff.",jp:"新しいスタッフを雇っている。"}]},{phrase:"take over",meaning:"引き継ぐ / 乗っ取る",examples:[{en:"She took over the business.",jp:"彼女はビジネスを引き継いだ。"},{en:"He took over as manager.",jp:"彼はマネージャーを引き継いだ。"}]},{phrase:"take up",meaning:"始める / 占める",examples:[{en:"She took up yoga last year.",jp:"彼女は昨年ヨガを始めた。"},{en:"This table takes up too much space.",jp:"このテーブルは場所を取りすぎる。"}]}]},

  manage:{meaning:"管理する / うまくやる / なんとかする",forms:{"原形":"manage","三単現":"manages","過去形":"managed","過去分詞":"managed","現在分詞":"managing"},patterns:{SV:null,SVO:{en:"She manages a team.",jp:"彼女はチームを管理する。"},SVOO:null,SVOC:null},exceptions:["manage to = なんとか〜する","manage without = 〜なしでやっていく"],output:{"SVO":[{en:"She manages a team of ten.",jp:"彼女は10人のチームを管理する。"},{en:"He manages his time well.",jp:"彼は時間管理が上手だ。"},{en:"Can you manage it alone?",jp:"一人でできますか？"}],"応用":[{en:"I managed to finish on time.",jp:"なんとか時間通りに終わらせた。"},{en:"How do you manage without a car?",jp:"車なしでどうやってやっているの？"},{en:"She managed the crisis well.",jp:"彼女は危機をうまく乗り切った。"}]},pv:[{phrase:"manage without",meaning:"〜なしでやっていく",examples:[{en:"Can you manage without me?",jp:"私なしでやっていけますか？"},{en:"We'll have to manage without it.",jp:"それなしでやっていかなければならない。"}]}]},
  reduce:{meaning:"減らす / 削減する",forms:{"原形":"reduce","三単現":"reduces","過去形":"reduced","過去分詞":"reduced","現在分詞":"reducing"},patterns:{SV:null,SVO:{en:"Reduce your expenses.",jp:"支出を減らして。"},SVOO:null,SVOC:null},exceptions:["reduce to = 〜の状態に追い込む","reduce by = 〜だけ減らす"],output:{"SVO":[{en:"We need to reduce costs.",jp:"コストを削減する必要がある。"},{en:"Exercise reduces stress.",jp:"運動はストレスを軽減する。"},{en:"The price was reduced by 20%.",jp:"値段が20%引き下げられた。"}],"応用":[{en:"She was reduced to tears.",jp:"彼女は泣かされた。"},{en:"Reduce, reuse, recycle.",jp:"リデュース、リユース、リサイクル。"},{en:"They reduced the team size.",jp:"チームの規模を縮小した。"}]},pv:[{phrase:"reduce to",meaning:"〜の状態に追い込む / 〜に帰着する",examples:[{en:"She was reduced to tears.",jp:"彼女は泣かされた。"},{en:"It reduces to a simple question.",jp:"それは単純な問題に帰着する。"}]}]},
  increase:{meaning:"増やす / 増える",forms:{"原形":"increase","三単現":"increases","過去形":"increased","過去分詞":"increased","現在分詞":"increasing"},patterns:{SV:{en:"Sales increased.",jp:"売上が増えた。"},SVO:{en:"Increase your speed.",jp:"スピードを上げて。"},SVOO:null,SVOC:null},exceptions:["increase by = 〜だけ増える","on the increase = 増加中である"],output:{"SV/SVO":[{en:"Sales increased by 10%.",jp:"売上が10%増えた。"},{en:"She increased her vocabulary.",jp:"彼女は語彙を増やした。"},{en:"Exercise increases energy levels.",jp:"運動はエネルギーレベルを高める。"}],"応用":[{en:"Crime is on the increase.",jp:"犯罪が増加している。"},{en:"We need to increase efficiency.",jp:"効率を上げる必要がある。"},{en:"The population has increased rapidly.",jp:"人口が急速に増えた。"}]},pv:[{phrase:"increase by",meaning:"〜だけ増える",examples:[{en:"Sales increased by 20%.",jp:"売上が20%増えた。"},{en:"The price increased by $5.",jp:"価格が5ドル増えた。"}]}]},
  improve:{meaning:"改善する / 上達する",forms:{"原形":"improve","三単現":"improves","過去形":"improved","過去分詞":"improved","現在分詞":"improving"},patterns:{SV:{en:"Her English is improving.",jp:"彼女の英語は上達している。"},SVO:{en:"Improve your skills.",jp:"スキルを磨いて。"},SVOO:null,SVOC:null},exceptions:["improve on = 〜をさらに良くする","room for improvement = 改善の余地がある"],output:{"SV/SVO":[{en:"Her English is improving rapidly.",jp:"彼女の英語は急速に上達している。"},{en:"We need to improve customer service.",jp:"顧客サービスを改善する必要がある。"},{en:"He improved his score.",jp:"彼はスコアを改善した。"}],"応用":[{en:"There's always room for improvement.",jp:"常に改善の余地がある。"},{en:"She improved on her previous record.",jp:"彼女は以前の記録を更新した。"},{en:"Keep improving.",jp:"成長し続けて。"}]},pv:[{phrase:"improve on",meaning:"〜をさらに良くする / 更新する",examples:[{en:"She improved on her record.",jp:"彼女は記録を更新した。"},{en:"Can you improve on this design?",jp:"このデザインをさらに良くできますか？"}]}]},
  protect:{meaning:"守る / 保護する",forms:{"原形":"protect","三単現":"protects","過去形":"protected","過去分詞":"protected","現在分詞":"protecting"},patterns:{SV:null,SVO:{en:"Protect the environment.",jp:"環境を守る。"},SVOO:null,SVOC:null},exceptions:["protect from/against = 〜から守る","protection = 保護（名詞）"],output:{"SVO":[{en:"Protect the environment.",jp:"環境を守って。"},{en:"She protects her children.",jp:"彼女は子供たちを守る。"},{en:"This cream protects your skin.",jp:"このクリームはあなたの肌を守る。"}],"応用":[{en:"Protect yourself from the sun.",jp:"日差しから身を守って。"},{en:"We must protect endangered species.",jp:"絶滅危惧種を保護しなければならない。"},{en:"The law protects workers' rights.",jp:"法律は労働者の権利を守る。"}]},pv:[{phrase:"protect from",meaning:"〜から守る",examples:[{en:"Protect yourself from the sun.",jp:"日差しから身を守って。"},{en:"This vaccine protects from disease.",jp:"このワクチンは病気から守る。"}]}]},
  connect:{meaning:"つなぐ / 接続する",forms:{"原形":"connect","三単現":"connects","過去形":"connected","過去分詞":"connected","現在分詞":"connecting"},patterns:{SV:null,SVO:{en:"Connect the cables.",jp:"ケーブルをつないで。"},SVOO:null,SVOC:null},exceptions:["connect with = 〜とつながる・共感する","be connected to = 〜に接続されている"],output:{"SVO":[{en:"Connect the cables.",jp:"ケーブルをつないで。"},{en:"This flight connects to London.",jp:"この便はロンドンへの乗り継ぎがある。"},{en:"She connected with many people.",jp:"彼女は多くの人とつながった。"}],"応用":[{en:"Connect to the WiFi.",jp:"WiFiに接続して。"},{en:"The two cities are connected by train.",jp:"2つの都市は電車でつながっている。"},{en:"I really connected with that book.",jp:"その本にとても共感した。"}]},pv:[{phrase:"connect with",meaning:"〜とつながる / 共感する",examples:[{en:"I really connect with her music.",jp:"彼女の音楽にとても共感する。"},{en:"Connect with people around you.",jp:"周りの人とつながって。"}]}]},
  develop:{meaning:"発展する / 開発する",forms:{"原形":"develop","三単現":"develops","過去形":"developed","過去分詞":"developed","現在分詞":"developing"},patterns:{SV:{en:"The situation developed quickly.",jp:"状況は急速に発展した。"},SVO:{en:"She develops software.",jp:"彼女はソフトウェアを開発する。"},SVOO:null,SVOC:null},exceptions:["develop a habit = 習慣をつける","developing country = 発展途上国"],output:{"SV/SVO":[{en:"She develops mobile apps.",jp:"彼女はモバイルアプリを開発する。"},{en:"The situation developed unexpectedly.",jp:"状況が予想外に展開した。"},{en:"He developed a new strategy.",jp:"彼は新しい戦略を開発した。"}],"応用":[{en:"Develop good habits early.",jp:"早いうちに良い習慣をつけて。"},{en:"The country is still developing.",jp:"その国はまだ発展途上だ。"},{en:"She developed a passion for art.",jp:"彼女は芸術への情熱を持つようになった。"}]},pv:[{phrase:"develop into",meaning:"〜に発展する / 成長する",examples:[{en:"The idea developed into a business.",jp:"そのアイデアがビジネスに発展した。"},{en:"She developed into a great leader.",jp:"彼女は素晴らしいリーダーに成長した。"}]}]}
};

const CATEGORIES={"基本動詞":["be","have","do","make","get","take","give","keep","let","put"],"思考・感情":["think","feel","know","believe","understand","remember","forget","love","like","hate","hope","wish","want","seem","expect"],"コミュニケーション":["say","tell","speak","ask","write","read","listen","show","call","explain","discuss","suggest","agree","disagree"],"移動・動作":["come","go","run","walk","move","turn","stand","sit","lie","fall","rise","bring","send","leave","stay"],"生活・日常":["eat","drink","sleep","work","live","play","use","find","help","try","start","need","wait","buy","sell","pay","spend","meet","join"],"成長・変化":["learn","teach","study","grow","change","open","close","win","lose","develop","improve","increase","reduce","create","manage","protect","connect","support","include","allow","consider","decide","choose"]};
let currentVerb="be",activeCat="基本動詞",quizScore=0,quizTotal=0,quizAnswered=false,quizPool=[],quizIndex=0;

function speak(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.9;window.speechSynthesis.speak(u);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function initNav(){
  const catTabs=document.getElementById("catTabs"),verbGrid=document.getElementById("verbGrid"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn"),pagerInfo=document.getElementById("pagerInfo");
  function currentList(){return CATEGORIES[activeCat]||[];}
  function currentIdx(){return currentList().indexOf(currentVerb);}
  function updatePager(){const list=currentList(),idx=currentIdx(),inCat=idx>=0;prevBtn.disabled=!inCat||idx===0;nextBtn.disabled=!inCat||idx===list.length-1;pagerInfo.textContent=inCat?(idx+1)+"/"+list.length:"";}
  function selectVerb(v){currentVerb=v;renderVerbs();loadVerb(v);buildQuizPool();loadQuiz();}
  function renderCats(){catTabs.innerHTML="";Object.keys(CATEGORIES).forEach(cat=>{const btn=document.createElement("button");btn.className="cat-tab"+(cat===activeCat?" active":"");btn.textContent=cat;btn.addEventListener("click",()=>{activeCat=cat;renderCats();selectVerb(CATEGORIES[cat][0]);});catTabs.appendChild(btn);});}
  function renderVerbs(){verbGrid.innerHTML="";currentList().forEach(v=>{const btn=document.createElement("button");btn.className="verb-btn"+(v===currentVerb?" active":"");btn.textContent=v;btn.addEventListener("click",()=>selectVerb(v));verbGrid.appendChild(btn);});updatePager();}
  prevBtn.addEventListener("click",()=>{const idx=currentIdx();if(idx>0)selectVerb(currentList()[idx-1]);});
  nextBtn.addEventListener("click",()=>{const idx=currentIdx(),list=currentList();if(idx<list.length-1)selectVerb(list[idx+1]);});
  document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;if(e.key==="ArrowLeft"&&!prevBtn.disabled)prevBtn.click();if(e.key==="ArrowRight"&&!nextBtn.disabled)nextBtn.click();});
  renderCats();renderVerbs();
  window._renderVerbBtns=renderVerbs;
}

function loadVerb(name){
  const d=VERBS[name];
  if(window._renderVerbBtns)window._renderVerbBtns();
  document.getElementById("verbWord").textContent=name;
  document.getElementById("verbMeaning").textContent=d.meaning;
  document.getElementById("speakWordBtn").onclick=()=>speak(name);
  const fg=document.getElementById("formsGrid");fg.innerHTML="";
  Object.entries(d.forms).forEach(([label,val])=>{const chip=document.createElement("div");chip.className="form-chip";chip.innerHTML=`<span class="form-chip-label">${esc(label)}</span><span class="form-chip-val">${esc(val)}</span>`;chip.addEventListener("click",()=>speak(val.split("/")[0]));fg.appendChild(chip);});
  const tbody=document.getElementById("patternsBody");tbody.innerHTML="";
  ["SV","SVO","SVOO","SVOC"].forEach(pat=>{const data=d.patterns[pat];const tr=document.createElement("tr");if(data){tr.innerHTML=`<td><span class="badge badge-yes">${esc(pat)}</span></td><td><div>${esc(data.en)}</div><div class="jp-text">${esc(data.jp)}</div></td><td><button class="speak-btn" style="font-size:.72rem;padding:5px 9px">🔊</button></td>`;tr.querySelector(".speak-btn").addEventListener("click",()=>speak(data.en));}else{tr.innerHTML=`<td><span class="badge badge-no">${esc(pat)}</span></td><td colspan="2" style="color:var(--muted);font-size:.8rem;font-style:italic">この文型は取らない</td>`;}tbody.appendChild(tr);});
  const exList=document.getElementById("exceptionList");exList.innerHTML="";
  (d.exceptions&&d.exceptions.length?d.exceptions:["特記事項なし"]).forEach(e=>{const li=document.createElement("li");li.textContent=e;exList.appendChild(li);});
  const outBody=document.getElementById("outputBody");outBody.innerHTML="";
  Object.entries(d.output).forEach(([groupLabel,sentences])=>{const group=document.createElement("div");group.className="output-group";group.innerHTML=`<div class="output-group-label">${esc(groupLabel)}</div>`;sentences.forEach(s=>{const row=document.createElement("div");row.className="sentence-row";row.innerHTML=`<div class="sentence-texts"><div class="sentence-en">${esc(s.en)}</div><div class="sentence-jp">${esc(s.jp)}</div></div><button class="speak-btn" style="font-size:.72rem;padding:5px 9px;flex-shrink:0">🔊</button>`;row.querySelector(".speak-btn").addEventListener("click",()=>speak(s.en));group.appendChild(row);});outBody.appendChild(group);});
  // phrasal verbs section
  const pvList=document.getElementById("pvList");pvList.innerHTML="";
  if(d.pv&&d.pv.length){d.pv.forEach(pv=>{const item=document.createElement("div");item.className="pv-item";item.innerHTML=`<div class="pv-item-header"><div><span class="pv-phrase">${esc(pv.phrase)}</span><span class="pv-meaning-tag">— ${esc(pv.meaning)}</span></div><button class="speak-btn" style="font-size:.72rem;padding:5px 9px;margin-left:auto">🔊</button></div><div class="pv-examples">${pv.examples.map(ex=>`<div class="pv-ex"><div class="pv-ex-texts"><div class="pv-ex-en">${esc(ex.en)}</div><div class="pv-ex-jp">${esc(ex.jp)}</div></div><button class="speak-btn" style="font-size:.68rem;padding:4px 8px;flex-shrink:0">🔊</button></div>`).join("")}</div>`;item.querySelector(".pv-item-header .speak-btn").addEventListener("click",()=>speak(pv.phrase));item.querySelectorAll(".pv-examples .speak-btn").forEach((btn,i)=>btn.addEventListener("click",()=>speak(pv.examples[i].en)));pvList.appendChild(item);});}else{pvList.innerHTML='<p style="color:var(--muted);font-size:.82rem;font-style:italic">句動詞なし</p>';}
}

function buildQuizPool(){
  const d=VERBS[currentVerb];const forms=Object.values(d.forms);quizPool=[];
  Object.values(d.output).forEach(sentences=>{sentences.forEach(s=>{let matched=null;for(const f of forms){const parts=f.split("/");for(const p of parts){if(new RegExp("\\b"+escRe(p)+"\\b","i").test(s.en)){matched=p;break;}}if(matched)break;}if(!matched)return;const distractors=[...new Set(forms.map(f=>f.split("/")[0]).filter(f=>f!==matched))].slice(0,3);const options=shuffle([matched,...distractors]);const blanked=s.en.replace(new RegExp("\\b"+escRe(matched)+"\\b","i"),"___");quizPool.push({blanked,jp:s.jp,answer:matched,options});});});
  quizPool=shuffle(quizPool);quizIndex=0;
}

function loadQuiz(){
  quizAnswered=false;const fb=document.getElementById("quizFeedback");fb.className="quiz-feedback";fb.textContent="";
  if(!quizPool.length){document.getElementById("quizText").textContent="クイズデータがありません。";document.getElementById("quizOptions").innerHTML="";return;}
  const q=quizPool[quizIndex%quizPool.length];
  document.getElementById("quizText").innerHTML=q.blanked.replace("___",`<span class="blank" id="blankSpan">${esc(q.answer)}</span>`);
  document.getElementById("blankSpan").style.color="transparent";
  document.getElementById("quizJp").textContent=q.jp;
  const optsEl=document.getElementById("quizOptions");optsEl.innerHTML="";
  q.options.forEach(opt=>{const btn=document.createElement("button");btn.className="quiz-opt";btn.textContent=opt;btn.addEventListener("click",()=>handleAnswer(opt,q.answer));optsEl.appendChild(btn);});
}

function handleAnswer(chosen,correct){
  if(quizAnswered)return;quizAnswered=true;quizTotal++;
  if(chosen===correct)quizScore++;
  document.querySelectorAll(".quiz-opt").forEach(btn=>{btn.disabled=true;if(btn.textContent===correct)btn.classList.add("correct");else if(btn.textContent===chosen&&chosen!==correct)btn.classList.add("wrong");});
  const blank=document.getElementById("blankSpan");if(blank){blank.style.color="";blank.classList.add("revealed");}
  const fb=document.getElementById("quizFeedback");
  fb.textContent=chosen===correct?"✓ 正解！":`✗ 不正解。正解は「${correct}」です。`;
  fb.className="quiz-feedback show "+(chosen===correct?"ok":"ng");
  document.getElementById("scoreNum").textContent=quizScore;
  document.getElementById("scoreDen").textContent=quizTotal;
  document.getElementById("progressBar").style.width=(quizTotal?(quizScore/quizTotal)*100:0)+"%";
  document.getElementById("progressLabel").textContent=`Quiz: ${quizScore}/${quizTotal}`;
}

window.addEventListener("DOMContentLoaded",()=>{
  initNav();loadVerb(currentVerb);buildQuizPool();loadQuiz();
  document.getElementById("nextQuizBtn").addEventListener("click",()=>{quizIndex=(quizIndex+1)%quizPool.length;loadQuiz();});
  document.getElementById("resetQuizBtn").addEventListener("click",()=>{quizScore=0;quizTotal=0;quizIndex=0;quizPool=shuffle(quizPool);document.getElementById("scoreNum").textContent=0;document.getElementById("scoreDen").textContent=0;document.getElementById("progressBar").style.width="0%";document.getElementById("progressLabel").textContent="Quiz: 0/0";loadQuiz();});
});
</script>
