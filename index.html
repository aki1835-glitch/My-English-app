<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語動詞 学習テンプレート</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#5b8dee;--accent2:#e8a87c;--text:#e8eaf0;--muted:#7a7f99;--border:#2e3248;--good:#4caf7d;--bad:#e05f5f;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;padding:0 0 60px;}
  .header{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--border);padding:28px 24px 20px;position:sticky;top:0;z-index:50;}
  .header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .logo{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--accent);letter-spacing:.02em;white-space:nowrap;}
  .logo em{font-style:italic;color:var(--accent2);}
  .verb-select-wrap{position:relative;}
  .verb-select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.8rem;}
  #verbSelect{appearance:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;padding:9px 36px 9px 14px;cursor:pointer;outline:none;transition:border-color .2s;}
  #verbSelect:focus{border-color:var(--accent);}
  .progress-bar-wrap{background:var(--surface2);border-radius:99px;height:6px;flex:1;min-width:80px;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease;width:0%;}
  .progress-label{font-size:.7rem;color:var(--muted);white-space:nowrap;}
  .main{max-width:860px;margin:0 auto;padding:32px 20px 0;}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .section-header{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .section-num{width:24px;height:24px;background:var(--accent);border-radius:50%;font-size:.72rem;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
  .section-title{font-size:.82rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  .section-body{padding:20px;}
  .verb-hero{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .verb-word{font-family:'DM Serif Display',serif;font-size:3rem;color:var(--accent);line-height:1;}
  .verb-meaning{color:var(--muted);font-size:.9rem;margin-top:4px;}
  .speak-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:8px 12px;transition:background .2s,transform .15s;display:flex;align-items:center;gap:6px;}
  .speak-btn:hover{background:var(--accent);border-color:var(--accent);transform:scale(1.04);}
  .forms-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
  .form-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:border-color .2s,background .2s;}
  .form-chip:hover{border-color:var(--accent);background:#1e2235;}
  .form-chip-label{font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  .form-chip-val{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.1rem;color:var(--accent2);}
  .patterns-table{width:100%;border-collapse:collapse;}
  .patterns-table th{text-align:left;font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);}
  .patterns-table td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.88rem;}
  .patterns-table tr:last-child td{border-bottom:none;}
  .patterns-table tr:hover td{background:var(--surface2);}
  .badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:.72rem;font-weight:500;letter-spacing:.05em;}
  .badge-yes{background:rgba(91,141,238,.15);color:var(--accent);border:1px solid rgba(91,141,238,.3);}
  .badge-no{background:rgba(224,95,95,.1);color:var(--bad);border:1px solid rgba(224,95,95,.2);}
  .jp-text{color:var(--muted);font-size:.82rem;margin-top:3px;}
  .exception-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
  .exception-list li{background:rgba(232,168,124,.08);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:9px 14px;font-size:.85rem;color:var(--accent2);}
  .output-group{margin-bottom:24px;}
  .output-group:last-child{margin-bottom:0;}
  .output-group-label{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .output-group-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .sentence-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .sentence-row:last-child{border-bottom:none;}
  .sentence-texts{flex:1;}
  .sentence-en{font-size:.92rem;color:var(--text);}
  .sentence-jp{font-size:.78rem;color:var(--muted);margin-top:3px;}
  .quiz-question{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;}
  .quiz-q-label{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .quiz-q-text{font-size:1rem;color:var(--text);line-height:1.6;}
  .blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--accent);margin:0 4px;color:transparent;user-select:none;}
  .blank.revealed{color:var(--accent2);border-color:var(--accent2);}
  .quiz-jp{font-size:.8rem;color:var(--muted);margin-top:6px;}
  .quiz-options{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .quiz-opt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);cursor:pointer;transition:background .18s,border-color .18s,transform .1s;}
  .quiz-opt:hover:not(:disabled){border-color:var(--accent);background:#1e2235;transform:translateY(-1px);}
  .quiz-opt:disabled{cursor:default;opacity:.7;}
  .quiz-opt.correct{background:rgba(76,175,125,.15);border-color:var(--good);color:var(--good);}
  .quiz-opt.wrong{background:rgba(224,95,95,.12);border-color:var(--bad);color:var(--bad);}
  .quiz-feedback{font-size:.82rem;padding:8px 14px;border-radius:8px;margin-bottom:12px;display:none;}
  .quiz-feedback.show{display:block;}
  .quiz-feedback.ok{background:rgba(76,175,125,.1);color:var(--good);border:1px solid rgba(76,175,125,.2);}
  .quiz-feedback.ng{background:rgba(224,95,95,.08);color:var(--bad);border:1px solid rgba(224,95,95,.2);}
  .quiz-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .btn-primary{background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:9px 20px;transition:opacity .2s,transform .15s;}
  .btn-primary:hover{opacity:.88;transform:translateY(-1px);}
  .btn-secondary{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;padding:9px 20px;transition:border-color .2s,color .2s;}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .score-display{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted);margin-left:auto;}
  .score-num{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--accent2);}
  @media(max-width:580px){.verb-word{font-size:2.2rem;}.patterns-table th:nth-child(3),.patterns-table td:nth-child(3){display:none;}.section-body{padding:14px;}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">Verb<em>Lab</em></div>
    <div class="verb-select-wrap"><select id="verbSelect"></select></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">Quiz: 0/0</div>
  </div>
</header>
<main class="main">
  <div class="section" style="animation-delay:.05s">
    <div class="section-header"><div class="section-num">1</div><div class="section-title">動詞情報</div></div>
    <div class="section-body">
      <div class="verb-hero">
        <div><div class="verb-word" id="verbWord"></div><div class="verb-meaning" id="verbMeaning"></div></div>
        <button class="speak-btn" id="speakWordBtn">🔊 発音を聞く</button>
      </div>
      <div class="forms-grid" id="formsGrid"></div>
    </div>
  </div>
  <div class="section" style="animation-delay:.1s">
    <div class="section-header"><div class="section-num">2</div><div class="section-title">5文型</div></div>
    <div class="section-body" style="padding:0">
      <table class="patterns-table">
        <thead><tr><th>文型</th><th>例文</th><th>音声</th></tr></thead>
        <tbody id="patternsBody"></tbody>
      </table>
    </div>
  </div>
  <div class="section" style="animation-delay:.15s">
    <div class="section-header"><div class="section-num">3</div><div class="section-title">例外・注意点</div></div>
    <div class="section-body"><ul class="exception-list" id="exceptionList"></ul></div>
  </div>
  <div class="section" style="animation-delay:.2s">
    <div class="section-header"><div class="section-num">4</div><div class="section-title">アウトプット練習</div></div>
    <div class="section-body" id="outputBody"></div>
  </div>
  <div class="section" style="animation-delay:.25s">
    <div class="section-header">
      <div class="section-num">5</div><div class="section-title">クイズ</div>
      <div class="score-display"><span>正解</span><span class="score-num" id="scoreNum">0</span><span>/</span><span id="scoreDen">0</span></div>
    </div>
    <div class="section-body">
      <div class="quiz-question">
        <div class="quiz-q-label">空欄に入る動詞の形を選んでください</div>
        <div class="quiz-q-text" id="quizText"></div>
        <div class="quiz-jp" id="quizJp"></div>
      </div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-controls">
        <button class="btn-primary" id="nextQuizBtn">次の問題 →</button>
        <button class="btn-secondary" id="resetQuizBtn">リセット</button>
      </div>
    </div>
  </div>
</main>
<script>
const VERBS = {
  be:{meaning:"〜である / いる / ある",forms:{"原形":"be","三単現":"is","過去形":"was/were","過去分詞":"been","現在分詞":"being"},patterns:{SV:{en:"She is here.",jp:"彼女はここにいる。"},SVO:null,SVOO:null,SVOC:{en:"He is a doctor.",jp:"彼は医者だ。"}},exceptions:["am/is/are（現在）、was/were（過去）と不規則変化","受動態・進行形で助動詞として使われる"],output:{"SV":[{en:"She is here.",jp:"彼女はここにいる。"},{en:"They were at school.",jp:"彼らは学校にいた。"},{en:"The keys are on the table.",jp:"鍵はテーブルの上にある。"}],"SVOC":[{en:"He is a doctor.",jp:"彼は医者だ。"},{en:"The weather is beautiful today.",jp:"今日の天気は素晴らしい。"},{en:"I am happy.",jp:"私は幸せだ。"}]}},
  have:{meaning:"持つ / 経験する",forms:{"原形":"have","三単現":"has","過去形":"had","過去分詞":"had","現在分詞":"having"},patterns:{SV:null,SVO:{en:"I have a car.",jp:"私は車を持っている。"},SVOO:null,SVOC:{en:"I have him clean the room.",jp:"私は彼に部屋を掃除させる。"}},exceptions:['"have got" = 持っている（口語）',"完了形で重要：have + 過去分詞","使役動詞：have + O + 動詞原形"],output:{"SVO":[{en:"I have a car.",jp:"私は車を持っている。"},{en:"She has a dog.",jp:"彼女は犬を持っている。"},{en:"We have many books.",jp:"私たちは多くの本を持っている。"}],"応用（完了形）":[{en:"I have finished my work.",jp:"私は仕事を終えた。"},{en:"I have been studying English for years.",jp:"私は何年も英語を勉強している。"},{en:"Have you ever had sushi?",jp:"寿司を食べたことがありますか？"}]}},
  do:{meaning:"する / 行う",forms:{"原形":"do","三単現":"does","過去形":"did","過去分詞":"done","現在分詞":"doing"},patterns:{SV:null,SVO:{en:"I do my homework.",jp:"私は宿題をする。"},SVOO:null,SVOC:null},exceptions:["助動詞として疑問文・否定文を作る","do well / do badly = うまくいく・うまくいかない"],output:{"SVO":[{en:"I do my homework.",jp:"私は宿題をする。"},{en:"She does yoga every morning.",jp:"彼女は毎朝ヨガをする。"},{en:"We did our best.",jp:"私たちは最善を尽くした。"}],"応用":[{en:"Do you speak English?",jp:"あなたは英語を話しますか？"},{en:"I don't know the answer.",jp:"私は答えを知らない。"},{en:"She did well on the test.",jp:"彼女はテストでよくできた。"}]}},
  make:{meaning:"作る / 〜にする",forms:{"原形":"make","三単現":"makes","過去形":"made","過去分詞":"made","現在分詞":"making"},patterns:{SV:null,SVO:{en:"I make a cake.",jp:"私はケーキを作る。"},SVOO:{en:"I make you a cake.",jp:"あなたにケーキを作る。"},SVOC:{en:"I make him happy.",jp:"彼を幸せにする。"}},exceptions:["使役動詞：make + O + 動詞原形（強制）","make it = うまくやる・間に合う"],output:{"SVO":[{en:"I make a cake.",jp:"私はケーキを作る。"},{en:"She makes dinner every day.",jp:"彼女は毎日夕食を作る。"},{en:"We make plans together.",jp:"私たちは一緒に計画を立てる。"}],"SVOC":[{en:"I make him happy.",jp:"私は彼を幸せにする。"},{en:"The news made her sad.",jp:"そのニュースは彼女を悲しくさせた。"},{en:"Hard work makes you stronger.",jp:"努力はあなたを強くする。"}]}},
  get:{meaning:"得る / 〜になる / 着く",forms:{"原形":"get","三単現":"gets","過去形":"got","過去分詞":"gotten/got","現在分詞":"getting"},patterns:{SV:{en:"I get there by bus.",jp:"私はバスでそこに着く。"},SVO:{en:"I get a gift.",jp:"私はプレゼントをもらう。"},SVOO:{en:"I get you a seat.",jp:"あなたに席を取る。"},SVOC:{en:"I get him to work.",jp:"彼に仕事をさせる。"}},exceptions:["get + 形容詞 = 〜になる（get tired / get better）","使役：get + O + to不定詞"],output:{"SVO":[{en:"I got a new job.",jp:"私は新しい仕事を得た。"},{en:"She gets good grades.",jp:"彼女は良い成績を取る。"},{en:"We got the news.",jp:"私たちはそのニュースを聞いた。"}],"応用":[{en:"I got tired after work.",jp:"仕事の後に疲れた。"},{en:"She got better quickly.",jp:"彼女はすぐに良くなった。"},{en:"He got her to sign the form.",jp:"彼は彼女に書類にサインさせた。"}]}},
  take:{meaning:"取る / 連れて行く / かかる",forms:{"原形":"take","三単現":"takes","過去形":"took","過去分詞":"taken","現在分詞":"taking"},patterns:{SV:null,SVO:{en:"I take a bus.",jp:"私はバスに乗る。"},SVOO:{en:"I take him a message.",jp:"彼にメッセージを持っていく。"},SVOC:null},exceptions:["It takes + 時間 = 〜の時間がかかる","take + O + to場所 = Oを〜へ連れて行く"],output:{"SVO":[{en:"I take a bus to work.",jp:"私はバスで通勤する。"},{en:"She took a photo.",jp:"彼女は写真を撮った。"},{en:"He takes a walk every evening.",jp:"彼は毎晩散歩する。"}],"応用":[{en:"It takes two hours to get there.",jp:"そこに着くのに2時間かかる。"},{en:"She took me to the hospital.",jp:"彼女は私を病院に連れて行った。"},{en:"Take your time.",jp:"ゆっくりどうぞ。"}]}},
  give:{meaning:"与える / 渡す",forms:{"原形":"give","三単現":"gives","過去形":"gave","過去分詞":"given","現在分詞":"giving"},patterns:{SV:null,SVO:{en:"I give money.",jp:"私はお金を渡す。"},SVOO:{en:"I give her a book.",jp:"私は彼女に本をあげる。"},SVOC:null},exceptions:["give up = あきらめる","give in = 従う・折れる"],output:{"SVOO":[{en:"I gave her a book.",jp:"私は彼女に本をあげた。"},{en:"He gave me good advice.",jp:"彼は私に良いアドバイスをくれた。"},{en:"Give me a call later.",jp:"後で電話して。"}],"応用":[{en:"Don't give up.",jp:"あきらめないで。"},{en:"She gave a speech.",jp:"彼女はスピーチをした。"},{en:"Give it a try.",jp:"試してみて。"}]}},
  know:{meaning:"知っている / わかる",forms:{"原形":"know","三単現":"knows","過去形":"knew","過去分詞":"known","現在分詞":"knowing"},patterns:{SV:null,SVO:{en:"I know the answer.",jp:"私は答えを知っている。"},SVOO:null,SVOC:null},exceptions:["状態動詞のため進行形にしない","You know = ほら・つまり（口語）"],output:{"SVO":[{en:"I know the answer.",jp:"私は答えを知っている。"},{en:"She knows how to cook.",jp:"彼女は料理の仕方を知っている。"},{en:"Do you know him?",jp:"あなたは彼を知っていますか？"}],"応用":[{en:"I knew it would rain.",jp:"雨が降るとわかっていた。"},{en:"Let me know if you need help.",jp:"助けが必要なら教えて。"},{en:"She is known as a great singer.",jp:"彼女は偉大な歌手として知られている。"}]}},
  think:{meaning:"思う / 考える",forms:{"原形":"think","三単現":"thinks","過去形":"thought","過去分詞":"thought","現在分詞":"thinking"},patterns:{SV:null,SVO:{en:"I think about it.",jp:"私はそれについて考える。"},SVOO:null,SVOC:{en:"I think him smart.",jp:"私は彼が賢いと思う。"}},exceptions:["think of = 〜を思いつく","think about = 〜について考える"],output:{"SVO":[{en:"I think about the future.",jp:"私は将来について考える。"},{en:"What do you think?",jp:"あなたはどう思いますか？"},{en:"I was thinking about you.",jp:"あなたのことを考えていた。"}],"応用":[{en:"I think it will be fine.",jp:"大丈夫だと思う。"},{en:"Think carefully before deciding.",jp:"決める前によく考えて。"},{en:"She thinks of a good idea.",jp:"彼女は良いアイデアを思いつく。"}]}},
  say:{meaning:"言う / 述べる",forms:{"原形":"say","三単現":"says","過去形":"said","過去分詞":"said","現在分詞":"saying"},patterns:{SV:null,SVO:{en:"She says hello.",jp:"彼女はこんにちはと言う。"},SVOO:null,SVOC:null},exceptions:["say to + 人 = 〜に言う","They say (that)... = 〜と言われている"],output:{"SVO":[{en:"She says hello to everyone.",jp:"彼女はみんなにこんにちはと言う。"},{en:"He said nothing.",jp:"彼は何も言わなかった。"},{en:"What did you say?",jp:"何と言いましたか？"}],"応用":[{en:"They say it will snow tomorrow.",jp:"明日雪が降ると言われている。"},{en:"Say it again, please.",jp:"もう一度言ってください。"},{en:"It goes without saying.",jp:"言うまでもない。"}]}},
  tell:{meaning:"伝える / 話す / 命じる",forms:{"原形":"tell","三単現":"tells","過去形":"told","過去分詞":"told","現在分詞":"telling"},patterns:{SV:null,SVO:null,SVOO:{en:"I tell her the truth.",jp:"私は彼女に真実を伝える。"},SVOC:{en:"I tell him to stop.",jp:"私は彼に止まるよう言う。"}},exceptions:["tell + O + to不定詞 = Oに〜するよう言う","tell A from B = AとBを区別する"],output:{"SVOO":[{en:"I told her the truth.",jp:"私は彼女に真実を伝えた。"},{en:"He tells us stories.",jp:"彼は私たちに話をしてくれる。"},{en:"Please tell me your name.",jp:"名前を教えてください。"}],"SVOC":[{en:"She told him to be quiet.",jp:"彼女は彼に静かにするよう言った。"},{en:"Tell me what happened.",jp:"何が起きたか教えて。"},{en:"I told you so.",jp:"だから言ったでしょう。"}]}},
  see:{meaning:"見える / 理解する / 会う",forms:{"原形":"see","三単現":"sees","過去形":"saw","過去分詞":"seen","現在分詞":"seeing"},patterns:{SV:null,SVO:{en:"I see a bird.",jp:"私は鳥が見える。"},SVOO:null,SVOC:{en:"I see him run.",jp:"彼が走るのが見える。"}},exceptions:["知覚動詞：see + O + 動詞原形/現在分詞","I see. = なるほど・わかった"],output:{"SVO":[{en:"I see a bird in the tree.",jp:"木に鳥が見える。"},{en:"She saw a movie last night.",jp:"彼女は昨夜映画を見た。"},{en:"I see what you mean.",jp:"あなたの言いたいことがわかる。"}],"SVOC":[{en:"I saw him run away.",jp:"彼が逃げるのを見た。"},{en:"She saw the kids playing.",jp:"子供たちが遊んでいるのを見た。"},{en:"Let me see.",jp:"ちょっと見せて・えーと。"}]}},

  drink:{meaning:"飲む",forms:{"原形":"drink","三単現":"drinks","過去形":"drank","過去分詞":"drunk","現在分詞":"drinking"},patterns:{SV:null,SVO:{en:"I drink coffee.",jp:"私はコーヒーを飲む。"},SVOO:null,SVOC:null},exceptions:["drink up = 飲み干す","drink to = 〜に乾杯する"],output:{"SVO":[{en:"I drink coffee every morning.",jp:"毎朝コーヒーを飲む。"},{en:"She drank a glass of water.",jp:"彼女はコップ一杯の水を飲んだ。"},{en:"What would you like to drink?",jp:"何を飲みますか？"}],"応用":[{en:"Drink up your milk.",jp:"ミルクを飲み干して。"},{en:"Let's drink to your success!",jp:"あなたの成功に乾杯！"},{en:"He drinks too much coffee.",jp:"彼はコーヒーを飲みすぎる。"}]}},
  sleep:{meaning:"眠る / 寝る",forms:{"原形":"sleep","三単現":"sleeps","過去形":"slept","過去分詞":"slept","現在分詞":"sleeping"},patterns:{SV:{en:"I sleep early.",jp:"私は早く寝る。"},SVO:null,SVOO:null,SVOC:null},exceptions:["sleep in = 朝寝坊する","sleep on it = 一晩考える"],output:{"SV":[{en:"I sleep early on weekdays.",jp:"平日は早く寝る。"},{en:"She slept for ten hours.",jp:"彼女は10時間眠った。"},{en:"Did you sleep well?",jp:"よく眠れましたか？"}],"応用":[{en:"I slept in on Sunday.",jp:"日曜日に朝寝坊した。"},{en:"Let me sleep on it.",jp:"一晩考えさせて。"},{en:"The baby is sleeping.",jp:"赤ちゃんが眠っている。"}]}},
  run:{meaning:"走る / 経営する",forms:{"原形":"run","三単現":"runs","過去形":"ran","過去分詞":"run","現在分詞":"running"},patterns:{SV:{en:"I run every day.",jp:"私は毎日走る。"},SVO:{en:"She runs a business.",jp:"彼女はビジネスを経営する。"},SVOO:null,SVOC:null},exceptions:["run out of = 〜を使い果たす","run into = 偶然会う"],output:{"SV/SVO":[{en:"I run every morning.",jp:"毎朝走る。"},{en:"She runs a small restaurant.",jp:"彼女は小さなレストランを経営している。"},{en:"The train runs on time.",jp:"電車は時間通りに走る。"}],"応用":[{en:"We ran out of milk.",jp:"牛乳を使い果たした。"},{en:"I ran into an old friend.",jp:"旧友に偶然会った。"},{en:"He is running for president.",jp:"彼は大統領に立候補している。"}]}},
  walk:{meaning:"歩く / 散歩する",forms:{"原形":"walk","三単現":"walks","過去形":"walked","過去分詞":"walked","現在分詞":"walking"},patterns:{SV:{en:"I walk to work.",jp:"私は歩いて通勤する。"},SVO:{en:"I walk the dog.",jp:"私は犬を散歩させる。"},SVOO:null,SVOC:null},exceptions:["walk away = 立ち去る","walk through = 丁寧に説明する"],output:{"SV/SVO":[{en:"I walk to the station every day.",jp:"毎日駅まで歩く。"},{en:"She walks her dog in the park.",jp:"彼女は公園で犬を散歩させる。"},{en:"Let's walk a little faster.",jp:"もう少し早く歩きましょう。"}],"応用":[{en:"He walked away without a word.",jp:"彼は一言も言わずに立ち去った。"},{en:"Let me walk you through the process.",jp:"手順を丁寧に説明します。"},{en:"She walked into the room.",jp:"彼女は部屋に入った。"}]}},
  work:{meaning:"働く / 機能する",forms:{"原形":"work","三単現":"works","過去形":"worked","過去分詞":"worked","現在分詞":"working"},patterns:{SV:{en:"I work hard.",jp:"私は一生懸命働く。"},SVO:{en:"I work the night shift.",jp:"私は夜勤をする。"},SVOO:null,SVOC:null},exceptions:["work out = 解決する・運動する","work on = 〜に取り組む"],output:{"SV":[{en:"I work hard every day.",jp:"毎日一生懸命働く。"},{en:"She works at a hospital.",jp:"彼女は病院で働く。"},{en:"The plan worked perfectly.",jp:"計画は完璧に機能した。"}],"応用":[{en:"Things will work out.",jp:"物事はうまくいくだろう。"},{en:"I'm working on a new project.",jp:"新しいプロジェクトに取り組んでいる。"},{en:"Does this method work?",jp:"この方法は機能しますか？"}]}},
  live:{meaning:"住む / 生きる",forms:{"原形":"live","三単現":"lives","過去形":"lived","過去分詞":"lived","現在分詞":"living"},patterns:{SV:{en:"I live in Tokyo.",jp:"私は東京に住んでいる。"},SVO:null,SVOO:null,SVOC:null},exceptions:["live up to = 〜に応える","live on = 〜を食べて生きる"],output:{"SV":[{en:"I live in Tokyo.",jp:"私は東京に住んでいる。"},{en:"She has lived here for ten years.",jp:"彼女はここに10年住んでいる。"},{en:"Where do you live?",jp:"どこに住んでいますか？"}],"応用":[{en:"He lived up to our expectations.",jp:"彼は私たちの期待に応えた。"},{en:"She lives on vegetables and rice.",jp:"彼女は野菜とお米で生活している。"},{en:"Live and learn.",jp:"生きて学べ。"}]}},

  move:{meaning:"動く / 引越す / 感動させる",forms:{"原形":"move","三単現":"moves","過去形":"moved","過去分詞":"moved","現在分詞":"moving"},patterns:{SV:{en:"She moved to Osaka.",jp:"彼女は大阪に引っ越した。"},SVO:{en:"Move the table.",jp:"テーブルを動かして。"},SVOO:null,SVOC:null},exceptions:["move on = 前に進む","be moved = 感動する"],output:{"SV/SVO":[{en:"She moved to Osaka last year.",jp:"彼女は昨年大阪に引っ越した。"},{en:"Move the table to the corner.",jp:"テーブルを隅に動かして。"},{en:"The story moved me to tears.",jp:"その話に感動して涙が出た。"}],"応用":[{en:"It's time to move on.",jp:"前に進む時だ。"},{en:"I was deeply moved by the performance.",jp:"その演技に深く感動した。"},{en:"Move quickly.",jp:"素早く動いて。"}]}},
  change:{meaning:"変える / 変わる",forms:{"原形":"change","三単現":"changes","過去形":"changed","過去分詞":"changed","現在分詞":"changing"},patterns:{SV:{en:"Things change.",jp:"物事は変わる。"},SVO:{en:"Change your mind.",jp:"考えを変えて。"},SVOO:null,SVOC:null},exceptions:["change into = 〜に着替える・変身する","change one's mind = 気が変わる"],output:{"SV/SVO":[{en:"Times change.",jp:"時代は変わる。"},{en:"She changed her hairstyle.",jp:"彼女は髪型を変えた。"},{en:"Can you change this into dollars?",jp:"これをドルに両替できますか？"}],"応用":[{en:"I changed my mind.",jp:"気が変わった。"},{en:"She changed into a beautiful dress.",jp:"彼女は美しいドレスに着替えた。"},{en:"Change is inevitable.",jp:"変化は避けられない。"}]}},

  send:{meaning:"送る / 派遣する",forms:{"原形":"send","三単現":"sends","過去形":"sent","過去分詞":"sent","現在分詞":"sending"},patterns:{SV:null,SVO:{en:"I send an email.",jp:"私はメールを送る。"},SVOO:{en:"I send her a gift.",jp:"彼女にプレゼントを送る。"},SVOC:null},exceptions:["send off = 見送る・出発させる","send for = 〜を呼び寄せる"],output:{"SVO/SVOO":[{en:"I sent an email this morning.",jp:"今朝メールを送った。"},{en:"She sends her parents money every month.",jp:"彼女は毎月親にお金を送る。"},{en:"Send me the file.",jp:"ファイルを送って。"}],"応用":[{en:"We sent off the package.",jp:"荷物を発送した。"},{en:"Send for the doctor immediately.",jp:"すぐに医者を呼んで。"},{en:"I'll send you the details.",jp:"詳細を送ります。"}]}},
  wait:{meaning:"待つ",forms:{"原形":"wait","三単現":"waits","過去形":"waited","過去分詞":"waited","現在分詞":"waiting"},patterns:{SV:{en:"Please wait here.",jp:"ここで待ってください。"},SVO:null,SVOO:null,SVOC:null},exceptions:["wait for = 〜を待つ","can't wait = 待ちきれない"],output:{"SV/応用":[{en:"Please wait here.",jp:"ここで待ってください。"},{en:"I waited for her for an hour.",jp:"1時間彼女を待った。"},{en:"Don't keep me waiting.",jp:"私を待たせないで。"}],"会話":[{en:"I can't wait to see you.",jp:"あなたに会うのが待ちきれない。"},{en:"Wait a moment, please.",jp:"少々お待ちください。"},{en:"It was worth waiting for.",jp:"待った甲斐があった。"}]}},
  // ── 新規50語 ──
  buy:{meaning:"買う",forms:{"原形":"buy","三単現":"buys","過去形":"bought","過去分詞":"bought","現在分詞":"buying"},patterns:{SV:null,SVO:{en:"I buy groceries.",jp:"私は食料品を買う。"},SVOO:{en:"I buy her a gift.",jp:"彼女にプレゼントを買う。"},SVOC:null},exceptions:["buy into = 〜を信じる・賛同する","buy out = 買収する"],output:{"SVO/SVOO":[{en:"I buy groceries every weekend.",jp:"毎週末食料品を買う。"},{en:"She bought him a birthday cake.",jp:"彼女は彼に誕生日ケーキを買った。"},{en:"Where did you buy that?",jp:"それはどこで買ったの？"}],"応用":[{en:"I don't buy that excuse.",jp:"その言い訳は信じない。"},{en:"They bought out the company.",jp:"彼らはその会社を買収した。"},{en:"Buy low, sell high.",jp:"安く買って高く売れ。"}]}},
  sell:{meaning:"売る",forms:{"原形":"sell","三単現":"sells","過去形":"sold","過去分詞":"sold","現在分詞":"selling"},patterns:{SV:null,SVO:{en:"She sells flowers.",jp:"彼女は花を売る。"},SVOO:{en:"I sell him my car.",jp:"彼に車を売る。"},SVOC:null},exceptions:["sell out = 売り切れる","sell off = 処分のために売る"],output:{"SVO":[{en:"She sells handmade crafts online.",jp:"彼女はオンラインで手作り工芸品を売る。"},{en:"They sold the house.",jp:"彼らは家を売った。"},{en:"This product sells well.",jp:"この商品はよく売れる。"}],"応用":[{en:"The concert sold out in minutes.",jp:"コンサートは数分で売り切れた。"},{en:"He sold off his old furniture.",jp:"彼は古い家具を売り払った。"},{en:"Don't sell yourself short.",jp:"自分を過小評価しないで。"}]}},

  stay:{meaning:"滞在する / 〜のままでいる",forms:{"原形":"stay","三単現":"stays","過去形":"stayed","過去分詞":"stayed","現在分詞":"staying"},patterns:{SV:{en:"Please stay here.",jp:"ここにいてください。"},SVO:null,SVOO:null,SVOC:{en:"Stay calm.",jp:"冷静でいて。"}},exceptions:["stay up = 夜更かしする","stay in touch = 連絡を保つ"],output:{"SV":[{en:"Please stay here.",jp:"ここにいてください。"},{en:"She stayed at a hotel.",jp:"彼女はホテルに滞在した。"},{en:"Stay safe.",jp:"気をつけて。"}],"SVOC/応用":[{en:"Stay calm in an emergency.",jp:"緊急時は冷静でいて。"},{en:"I stayed up all night.",jp:"一晩中起きていた。"},{en:"Let's stay in touch.",jp:"連絡を取り合いましょう。"}]}},
  stand:{meaning:"立つ / 我慢する",forms:{"原形":"stand","三単現":"stands","過去形":"stood","過去分詞":"stood","現在分詞":"standing"},patterns:{SV:{en:"Stand up straight.",jp:"まっすぐ立って。"},SVO:{en:"I can't stand noise.",jp:"騒音が我慢できない。"},SVOO:null,SVOC:null},exceptions:["stand out = 目立つ","stand for = 〜を表す・支持する"],output:{"SV/SVO":[{en:"Stand up straight.",jp:"まっすぐ立って。"},{en:"I can't stand the heat.",jp:"この暑さは我慢できない。"},{en:"She stood in line for an hour.",jp:"彼女は1時間並んだ。"}],"応用":[{en:"He stands out in a crowd.",jp:"彼は人混みの中で目立つ。"},{en:"What does UN stand for?",jp:"UNは何を表しますか？"},{en:"Stand by for further instructions.",jp:"続きの指示を待って。"}]}},
  sit:{meaning:"座る",forms:{"原形":"sit","三単現":"sits","過去形":"sat","過去分詞":"sat","現在分詞":"sitting"},patterns:{SV:{en:"Please sit down.",jp:"座ってください。"},SVO:null,SVOO:null,SVOC:null},exceptions:["sit back = くつろぐ・傍観する","sit through = 最後まで座って聞く"],output:{"SV":[{en:"Please sit down.",jp:"座ってください。"},{en:"She sat by the window.",jp:"彼女は窓のそばに座った。"},{en:"Sit still.",jp:"じっとしていて。"}],"応用":[{en:"Sit back and relax.",jp:"くつろいでください。"},{en:"He sat through a three-hour lecture.",jp:"彼は3時間の講義を最後まで聞いた。"},{en:"We sat around the table.",jp:"私たちはテーブルを囲んで座った。"}]}},
  lie:{meaning:"横になる / 嘘をつく",forms:{"原形":"lie","三単現":"lies","過去形":"lay/lied","過去分詞":"lain/lied","現在分詞":"lying"},patterns:{SV:{en:"I lie on the sofa.",jp:"私はソファに横になる。"},SVO:null,SVOO:null,SVOC:null},exceptions:["lie down = 横になる（休息）","lie（嘘をつく）の過去形は lied"],output:{"SV":[{en:"She lies on the beach all day.",jp:"彼女は一日中ビーチで横になる。"},{en:"The answer lies in the details.",jp:"答えは細部に隠れている。"},{en:"He lied about his age.",jp:"彼は年齢について嘘をついた。"}],"応用":[{en:"Lie down and rest.",jp:"横になって休んで。"},{en:"Don't lie to me.",jp:"嘘をつかないで。"},{en:"The city lies along the river.",jp:"その街は川沿いに広がっている。"}]}},
  fall:{meaning:"落ちる / 転ぶ / 〜になる",forms:{"原形":"fall","三単現":"falls","過去形":"fell","過去分詞":"fallen","現在分詞":"falling"},patterns:{SV:{en:"Leaves fall in autumn.",jp:"秋に葉が落ちる。"},SVO:null,SVOO:null,SVOC:null},exceptions:["fall in love = 恋に落ちる","fall apart = ばらばらになる","fall behind = 遅れる"],output:{"SV":[{en:"Leaves fall in autumn.",jp:"秋に葉が落ちる。"},{en:"She fell on the ice.",jp:"彼女は氷の上で転んだ。"},{en:"Night falls early in winter.",jp:"冬は夜が早く来る。"}],"応用":[{en:"He fell in love with her.",jp:"彼は彼女に恋した。"},{en:"Don't fall behind on your work.",jp:"仕事で遅れを取らないで。"},{en:"Their plans fell apart.",jp:"彼らの計画は崩れた。"}]}},
  rise:{meaning:"上がる / 昇る / 起き上がる",forms:{"原形":"rise","三単現":"rises","過去形":"rose","過去分詞":"risen","現在分詞":"rising"},patterns:{SV:{en:"The sun rises in the east.",jp:"太陽は東から昇る。"},SVO:null,SVOO:null,SVOC:null},exceptions:["rise to the occasion = 状況に対処する","rise above = 〜を乗り越える"],output:{"SV":[{en:"The sun rises in the east.",jp:"太陽は東から昇る。"},{en:"Prices rose sharply last year.",jp:"昨年価格が急激に上がった。"},{en:"She rose to become CEO.",jp:"彼女はCEOにまで上り詰めた。"}],"応用":[{en:"He always rises to the occasion.",jp:"彼はいつも状況に対処する。"},{en:"Rise above your fears.",jp:"恐怖を乗り越えて。"},{en:"Rise and shine!",jp:"起きて！（朝の挨拶）"}]}},
  grow:{meaning:"育つ / 成長する / 〜になる",forms:{"原形":"grow","三単現":"grows","過去形":"grew","過去分詞":"grown","現在分詞":"growing"},patterns:{SV:{en:"Plants grow in spring.",jp:"植物は春に育つ。"},SVO:{en:"I grow vegetables.",jp:"私は野菜を育てる。"},SVOO:null,SVOC:null},exceptions:["grow up = 大人になる","grow into = 〜に成長する"],output:{"SV/SVO":[{en:"Plants grow quickly in summer.",jp:"植物は夏に速く育つ。"},{en:"She grows tomatoes in her garden.",jp:"彼女は庭でトマトを育てる。"},{en:"The company has grown rapidly.",jp:"その会社は急成長した。"}],"応用":[{en:"Grow up!",jp:"大人になって！"},{en:"He grew into a fine young man.",jp:"彼は立派な青年に成長した。"},{en:"She is growing more confident.",jp:"彼女はどんどん自信をつけている。"}]}},
  learn:{meaning:"学ぶ / 習得する",forms:{"原形":"learn","三単現":"learns","過去形":"learned/learnt","過去分詞":"learned/learnt","現在分詞":"learning"},patterns:{SV:null,SVO:{en:"I learn English.",jp:"私は英語を学ぶ。"},SVOO:null,SVOC:null},exceptions:["learn from = 〜から学ぶ","learn by heart = 暗記する"],output:{"SVO":[{en:"I learn English every day.",jp:"毎日英語を学ぶ。"},{en:"She learned to drive last year.",jp:"彼女は昨年運転を習った。"},{en:"You never stop learning.",jp:"学びは終わりがない。"}],"応用":[{en:"Learn from your mistakes.",jp:"失敗から学んで。"},{en:"I learned the poem by heart.",jp:"その詩を暗記した。"},{en:"He learned about the accident.",jp:"彼は事故について知った。"}]}},
  teach:{meaning:"教える",forms:{"原形":"teach","三単現":"teaches","過去形":"taught","過去分詞":"taught","現在分詞":"teaching"},patterns:{SV:null,SVO:{en:"She teaches math.",jp:"彼女は数学を教える。"},SVOO:{en:"I teach him English.",jp:"私は彼に英語を教える。"},SVOC:null},exceptions:["teach + O + to不定詞 = Oに〜の仕方を教える"],output:{"SVO/SVOO":[{en:"She teaches math at school.",jp:"彼女は学校で数学を教える。"},{en:"He taught me how to cook.",jp:"彼は私に料理の仕方を教えた。"},{en:"Who taught you English?",jp:"誰があなたに英語を教えたの？"}],"応用":[{en:"Experience teaches us a lot.",jp:"経験は多くを教えてくれる。"},{en:"She taught herself to play guitar.",jp:"彼女は独学でギターを弾けるようになった。"},{en:"Practice what you teach.",jp:"言行一致で。"}]}},
  study:{meaning:"勉強する / 研究する",forms:{"原形":"study","三単現":"studies","過去形":"studied","過去分詞":"studied","現在分詞":"studying"},patterns:{SV:null,SVO:{en:"I study English.",jp:"私は英語を勉強する。"},SVOO:null,SVOC:null},exceptions:["study for = 〜のために勉強する","study abroad = 留学する"],output:{"SVO":[{en:"I study English every morning.",jp:"毎朝英語を勉強する。"},{en:"She is studying for her exam.",jp:"彼女は試験のために勉強している。"},{en:"He studied medicine at university.",jp:"彼は大学で医学を勉強した。"}],"応用":[{en:"She studied abroad in the US.",jp:"彼女はアメリカに留学した。"},{en:"Study hard and play hard.",jp:"勉強も遊びも全力で。"},{en:"I need to study more.",jp:"もっと勉強しなければ。"}]}},
  understand:{meaning:"理解する / わかる",forms:{"原形":"understand","三単現":"understands","過去形":"understood","過去分詞":"understood","現在分詞":"understanding"},patterns:{SV:null,SVO:{en:"I understand the problem.",jp:"私は問題を理解している。"},SVOO:null,SVOC:null},exceptions:["make oneself understood = 自分の意思を伝える","understand each other = お互いを理解する"],output:{"SVO":[{en:"I understand the problem.",jp:"私は問題を理解している。"},{en:"Do you understand?",jp:"わかりますか？"},{en:"She understands how I feel.",jp:"彼女は私の気持ちを理解している。"}],"応用":[{en:"I made myself understood in English.",jp:"英語で意思疎通できた。"},{en:"They finally understood each other.",jp:"彼らはついにお互いを理解した。"},{en:"I understand where you're coming from.",jp:"あなたの言いたいことはわかる。"}]}},
  believe:{meaning:"信じる / 思う",forms:{"原形":"believe","三単現":"believes","過去形":"believed","過去分詞":"believed","現在分詞":"believing"},patterns:{SV:null,SVO:{en:"I believe you.",jp:"私はあなたを信じる。"},SVOO:null,SVOC:null},exceptions:["believe in = 〜を信じる（存在・価値）","I believe so. = そう思います"],output:{"SVO":[{en:"I believe you.",jp:"私はあなたを信じる。"},{en:"She believes everything he says.",jp:"彼女は彼の言うことを何でも信じる。"},{en:"I believe it will work.",jp:"うまくいくと信じている。"}],"応用":[{en:"Believe in yourself.",jp:"自分を信じて。"},{en:"I believe in second chances.",jp:"やり直しのチャンスを信じている。"},{en:"Would you believe it?",jp:"信じられる？"}]}},
  remember:{meaning:"覚えている / 思い出す",forms:{"原形":"remember","三単現":"remembers","過去形":"remembered","過去分詞":"remembered","現在分詞":"remembering"},patterns:{SV:null,SVO:{en:"I remember his name.",jp:"私は彼の名前を覚えている。"},SVOO:null,SVOC:null},exceptions:["remember + 動名詞 = 〜したことを覚えている","remember + to不定詞 = 〜するのを忘れずに覚えている"],output:{"SVO":[{en:"I remember his name.",jp:"私は彼の名前を覚えている。"},{en:"Do you remember me?",jp:"私のことを覚えていますか？"},{en:"I remember meeting her once.",jp:"一度彼女に会ったことを覚えている。"}],"応用":[{en:"Remember to lock the door.",jp:"ドアに鍵をかけるのを忘れずに。"},{en:"I can't remember where I put it.",jp:"どこに置いたか思い出せない。"},{en:"Remember the good times.",jp:"良い思い出を大切に。"}]}},
  forget:{meaning:"忘れる",forms:{"原形":"forget","三単現":"forgets","過去形":"forgot","過去分詞":"forgotten/forgot","現在分詞":"forgetting"},patterns:{SV:null,SVO:{en:"I forget names easily.",jp:"私は名前をすぐ忘れる。"},SVOO:null,SVOC:null},exceptions:["forget + 動名詞 = 〜したことを忘れる","forget + to不定詞 = 〜するのを忘れる"],output:{"SVO":[{en:"I forgot her birthday.",jp:"彼女の誕生日を忘れた。"},{en:"Don't forget your keys.",jp:"鍵を忘れないで。"},{en:"I never forget a face.",jp:"顔は絶対に忘れない。"}],"応用":[{en:"I forgot to call him.",jp:"彼に電話するのを忘れた。"},{en:"Forget about it.",jp:"気にしないで。"},{en:"She forgot meeting him before.",jp:"以前彼に会ったことを忘れていた。"}]}},
  love:{meaning:"愛する / 大好きだ",forms:{"原形":"love","三単現":"loves","過去形":"loved","過去分詞":"loved","現在分詞":"loving"},patterns:{SV:null,SVO:{en:"I love her.",jp:"私は彼女を愛している。"},SVOO:null,SVOC:null},exceptions:["love + 動名詞/to不定詞 = 〜するのが大好きだ","fall in love = 恋に落ちる"],output:{"SVO":[{en:"I love my family.",jp:"私は家族を愛している。"},{en:"She loves cooking.",jp:"彼女は料理が大好きだ。"},{en:"I'd love to come.",jp:"ぜひ行きたいです。"}],"応用":[{en:"Love what you do.",jp:"自分の仕事を愛して。"},{en:"I love it here.",jp:"ここが大好きだ。"},{en:"Would love to hear from you.",jp:"ぜひ連絡してください。"}]}},
  like:{meaning:"好きだ / 〜したい",forms:{"原形":"like","三単現":"likes","過去形":"liked","過去分詞":"liked","現在分詞":"liking"},patterns:{SV:null,SVO:{en:"I like coffee.",jp:"私はコーヒーが好きだ。"},SVOO:null,SVOC:{en:"I'd like you to stay.",jp:"あなたにいてほしい。"}},exceptions:["would like = 〜したい（丁寧な表現）","like + 動名詞/to不定詞 = 〜することが好きだ"],output:{"SVO":[{en:"I like coffee in the morning.",jp:"朝はコーヒーが好きだ。"},{en:"She likes reading books.",jp:"彼女は読書が好きだ。"},{en:"What do you like to do?",jp:"何をするのが好きですか？"}],"応用":[{en:"I'd like a glass of water.",jp:"水を一杯ください。"},{en:"Would you like some help?",jp:"手伝いましょうか？"},{en:"I like the way you think.",jp:"あなたの考え方が好きだ。"}]}},
  hate:{meaning:"憎む / 嫌いだ",forms:{"原形":"hate","三単現":"hates","過去形":"hated","過去分詞":"hated","現在分詞":"hating"},patterns:{SV:null,SVO:{en:"I hate waiting.",jp:"私は待つのが嫌いだ。"},SVOO:null,SVOC:null},exceptions:["hate + 動名詞 = 〜するのが嫌いだ","I hate to say this but... = こんなことを言いたくないが…"],output:{"SVO":[{en:"I hate waiting in lines.",jp:"列に並んで待つのが嫌いだ。"},{en:"She hates getting up early.",jp:"彼女は早起きが嫌いだ。"},{en:"He hates being told what to do.",jp:"彼は指図されるのが嫌いだ。"}],"応用":[{en:"I hate to say this, but you're wrong.",jp:"こんなことを言いたくないが、あなたは間違っている。"},{en:"Don't hate, appreciate.",jp:"憎まず、感謝しなさい。"},{en:"I hate it when that happens.",jp:"そういうことが起きると嫌だ。"}]}},
  hope:{meaning:"望む / 希望する",forms:{"原形":"hope","三単現":"hopes","過去形":"hoped","過去分詞":"hoped","現在分詞":"hoping"},patterns:{SV:null,SVO:{en:"I hope you're well.",jp:"お元気でいらっしゃることを願っています。"},SVOO:null,SVOC:null},exceptions:["hope for = 〜を望む","hope to = 〜することを望む","I hope so. = そうだといいな"],output:{"SVO":[{en:"I hope you feel better soon.",jp:"すぐに元気になることを願っています。"},{en:"She hopes to become a doctor.",jp:"彼女は医者になることを望んでいる。"},{en:"We hope for the best.",jp:"最善を望む。"}],"応用":[{en:"I hope so.",jp:"そうだといいな。"},{en:"Hope for the best, prepare for the worst.",jp:"最善を望み、最悪に備えよ。"},{en:"I hope to see you again.",jp:"またお会いできることを楽しみにしています。"}]}},
  wish:{meaning:"願う / 望む",forms:{"原形":"wish","三単現":"wishes","過去形":"wished","過去分詞":"wished","現在分詞":"wishing"},patterns:{SV:null,SVO:{en:"I wish you luck.",jp:"幸運を祈る。"},SVOO:{en:"I wish you a happy birthday.",jp:"お誕生日おめでとう。"},SVOC:null},exceptions:["wish + 仮定法 = 〜であればいいのに","wish + O + well = Oの幸運を祈る"],output:{"SVO/SVOO":[{en:"I wish you good luck.",jp:"幸運を祈る。"},{en:"She wishes she could fly.",jp:"彼女は飛べたらと思っている。"},{en:"I wish it were Friday.",jp:"金曜日だったらなあ。"}],"応用":[{en:"Best wishes.",jp:"お幸せに・よろしく。"},{en:"Wish me luck!",jp:"幸運を祈って！"},{en:"I wish I had studied harder.",jp:"もっと勉強しておけばよかった。"}]}},
  decide:{meaning:"決める / 決断する",forms:{"原形":"decide","三単現":"decides","過去形":"decided","過去分詞":"decided","現在分詞":"deciding"},patterns:{SV:null,SVO:{en:"I decide the date.",jp:"私は日付を決める。"},SVOO:null,SVOC:null},exceptions:["decide on = 〜に決める","decide to = 〜することを決める"],output:{"SVO":[{en:"I decided the meeting date.",jp:"会議の日を決めた。"},{en:"Have you decided what to order?",jp:"注文するものは決まりましたか？"},{en:"She decided to quit her job.",jp:"彼女は仕事を辞めることを決めた。"}],"応用":[{en:"We decided on the blue one.",jp:"青いほうに決めた。"},{en:"Let's decide now.",jp:"今決めましょう。"},{en:"He can't make up his mind.",jp:"彼は決断できない。"}]}},
  choose:{meaning:"選ぶ / 選択する",forms:{"原形":"choose","三単現":"chooses","過去形":"chose","過去分詞":"chosen","現在分詞":"choosing"},patterns:{SV:null,SVO:{en:"Choose your words carefully.",jp:"言葉を慎重に選んで。"},SVOO:null,SVOC:null},exceptions:["choose between = 〜の間で選ぶ","choose to = 〜することを選ぶ"],output:{"SVO":[{en:"Choose your words carefully.",jp:"言葉を慎重に選んで。"},{en:"She chose the red dress.",jp:"彼女は赤いドレスを選んだ。"},{en:"Which do you choose?",jp:"どちらを選びますか？"}],"応用":[{en:"Choose between A and B.",jp:"AとBの間で選んで。"},{en:"He chose to stay silent.",jp:"彼は黙っていることを選んだ。"},{en:"You chose well.",jp:"良い選択をしたね。"}]}},
  agree:{meaning:"同意する / 賛成する",forms:{"原形":"agree","三単現":"agrees","過去形":"agreed","過去分詞":"agreed","現在分詞":"agreeing"},patterns:{SV:{en:"I agree.",jp:"賛成します。"},SVO:null,SVOO:null,SVOC:null},exceptions:["agree with = 〜に同意する","agree on = 〜について合意する","agree to = 〜に同意する（提案など）"],output:{"SV":[{en:"I totally agree.",jp:"まったく同意します。"},{en:"Do you agree?",jp:"賛成ですか？"},{en:"We finally agreed.",jp:"私たちはついに合意した。"}],"応用":[{en:"I agree with you on that.",jp:"その点については同意します。"},{en:"They agreed on a price.",jp:"彼らは価格で合意した。"},{en:"She agreed to help.",jp:"彼女は手伝うことに同意した。"}]}},
  disagree:{meaning:"反対する / 意見が違う",forms:{"原形":"disagree","三単現":"disagrees","過去形":"disagreed","過去分詞":"disagreed","現在分詞":"disagreeing"},patterns:{SV:{en:"I disagree.",jp:"反対します。"},SVO:null,SVOO:null,SVOC:null},exceptions:["disagree with = 〜に反対する","agree to disagree = 意見の相違を認める"],output:{"SV":[{en:"I strongly disagree.",jp:"強く反対します。"},{en:"They often disagree.",jp:"彼らはよく意見が合わない。"},{en:"It's okay to disagree.",jp:"意見が違っても大丈夫。"}],"応用":[{en:"I disagree with your approach.",jp:"あなたのアプローチに反対します。"},{en:"We agree to disagree.",jp:"意見の相違を認め合いましょう。"},{en:"She disagreed politely.",jp:"彼女は丁寧に反対した。"}]}},
  suggest:{meaning:"提案する / 勧める",forms:{"原形":"suggest","三単現":"suggests","過去形":"suggested","過去分詞":"suggested","現在分詞":"suggesting"},patterns:{SV:null,SVO:{en:"I suggest a meeting.",jp:"会議を提案する。"},SVOO:null,SVOC:null},exceptions:["suggest + 動名詞 = 〜することを提案する","suggest (that) + 仮定法現在 = 〜するよう提案する"],output:{"SVO":[{en:"I suggest we take a break.",jp:"休憩を取ることを提案します。"},{en:"She suggested going by train.",jp:"彼女は電車で行くことを提案した。"},{en:"Can you suggest a good restaurant?",jp:"良いレストランを勧めてもらえますか？"}],"応用":[{en:"The evidence suggests he is innocent.",jp:"証拠は彼の無実を示している。"},{en:"I suggest you reconsider.",jp:"再考することをお勧めします。"},{en:"What do you suggest?",jp:"何を提案しますか？"}]}},
  explain:{meaning:"説明する",forms:{"原形":"explain","三単現":"explains","過去形":"explained","過去分詞":"explained","現在分詞":"explaining"},patterns:{SV:null,SVO:{en:"Explain the problem.",jp:"問題を説明して。"},SVOO:{en:"Explain it to me.",jp:"私に説明して。"},SVOC:null},exceptions:["explain oneself = 言い訳をする・釈明する"],output:{"SVO/SVOO":[{en:"Can you explain this to me?",jp:"これを私に説明してもらえますか？"},{en:"She explained the rules clearly.",jp:"彼女はルールをわかりやすく説明した。"},{en:"He explained why he was late.",jp:"彼は遅れた理由を説明した。"}],"応用":[{en:"Let me explain.",jp:"説明させてください。"},{en:"That explains everything.",jp:"それですべてわかった。"},{en:"He had a lot to explain.",jp:"彼には多くの釈明が必要だった。"}]}},
  discuss:{meaning:"議論する / 話し合う",forms:{"原形":"discuss","三単現":"discusses","過去形":"discussed","過去分詞":"discussed","現在分詞":"discussing"},patterns:{SV:null,SVO:{en:"We discuss the plan.",jp:"私たちは計画を議論する。"},SVOO:null,SVOC:null},exceptions:["discuss + 目的語（×discuss about）","discuss the matter = 件を話し合う"],output:{"SVO":[{en:"We discussed the budget.",jp:"私たちは予算について話し合った。"},{en:"Let's discuss this later.",jp:"後でこれを話し合いましょう。"},{en:"They discussed the pros and cons.",jp:"彼らは賛否を議論した。"}],"応用":[{en:"We need to discuss this further.",jp:"これをさらに話し合う必要がある。"},{en:"She refused to discuss the matter.",jp:"彼女はその件について話すことを拒否した。"},{en:"It's worth discussing.",jp:"議論する価値がある。"}]}},
  consider:{meaning:"考慮する / 〜と見なす",forms:{"原形":"consider","三単現":"considers","過去形":"considered","過去分詞":"considered","現在分詞":"considering"},patterns:{SV:null,SVO:{en:"Consider all options.",jp:"すべての選択肢を考慮して。"},SVOO:null,SVOC:{en:"I consider him a friend.",jp:"私は彼を友人と見なす。"}},exceptions:["consider + 動名詞 = 〜することを検討する","all things considered = すべてを考慮すると"],output:{"SVO":[{en:"Consider all options carefully.",jp:"すべての選択肢を慎重に考慮して。"},{en:"She is considering moving abroad.",jp:"彼女は海外移住を検討している。"},{en:"Have you considered the risks?",jp:"リスクを考慮しましたか？"}],"SVOC/応用":[{en:"I consider him a close friend.",jp:"私は彼を親友と見なす。"},{en:"All things considered, it went well.",jp:"すべてを考慮すると、うまくいった。"},{en:"Consider yourself warned.",jp:"警告したからな。"}]}},
  expect:{meaning:"期待する / 予想する",forms:{"原形":"expect","三単現":"expects","過去形":"expected","過去分詞":"expected","現在分詞":"expecting"},patterns:{SV:null,SVO:{en:"I expect good results.",jp:"良い結果を期待する。"},SVOO:null,SVOC:{en:"I expect him to come.",jp:"彼が来ると思う。"}},exceptions:["expect + O + to不定詞 = Oが〜すると期待する","as expected = 予想通り"],output:{"SVO":[{en:"I expect good results.",jp:"良い結果を期待する。"},{en:"She expects too much.",jp:"彼女は期待しすぎる。"},{en:"What do you expect?",jp:"何を期待しているの？"}],"SVOC/応用":[{en:"I expect him to arrive soon.",jp:"彼はもうすぐ着くと思う。"},{en:"As expected, she did great.",jp:"予想通り、彼女は素晴らしかった。"},{en:"Don't expect too much.",jp:"期待しすぎないで。"}]}},
  allow:{meaning:"許可する / 〜できるようにする",forms:{"原形":"allow","三単現":"allows","過去形":"allowed","過去分詞":"allowed","現在分詞":"allowing"},patterns:{SV:null,SVO:{en:"Allow me.",jp:"私にやらせてください。"},SVOO:null,SVOC:{en:"Allow him to speak.",jp:"彼に話させる。"}},exceptions:["allow for = 〜を考慮に入れる","be allowed to = 〜することが許可されている"],output:{"SVO/SVOC":[{en:"Please allow me to introduce myself.",jp:"自己紹介させてください。"},{en:"She allowed him to use her car.",jp:"彼女は彼に車を使わせた。"},{en:"Smoking is not allowed here.",jp:"ここでは喫煙が許可されていない。"}],"応用":[{en:"Allow for delays.",jp:"遅れを考慮に入れて。"},{en:"Are we allowed to park here?",jp:"ここに駐車してもいいですか？"},{en:"This allows us to save time.",jp:"これにより時間を節約できる。"}]}},
  include:{meaning:"含む / 含める",forms:{"原形":"include","三単現":"includes","過去形":"included","過去分詞":"included","現在分詞":"including"},patterns:{SV:null,SVO:{en:"The price includes tax.",jp:"値段に税金が含まれる。"},SVOO:null,SVOC:null},exceptions:["including = 〜を含めて（前置詞的用法）","be included = 含まれている"],output:{"SVO":[{en:"The price includes tax.",jp:"値段に税金が含まれる。"},{en:"Does that include me?",jp:"それには私も含まれますか？"},{en:"The package includes a charger.",jp:"パッケージには充電器が含まれている。"}],"応用":[{en:"All meals are included.",jp:"食事はすべて込みです。"},{en:"Please include your contact details.",jp:"連絡先を含めてください。"},{en:"Including shipping, it costs $30.",jp:"送料込みで30ドルです。"}]}},
  support:{meaning:"支持する / 支える",forms:{"原形":"support","三単現":"supports","過去形":"supported","過去分詞":"supported","現在分詞":"supporting"},patterns:{SV:null,SVO:{en:"I support her decision.",jp:"私は彼女の決断を支持する。"},SVOO:null,SVOC:null},exceptions:["support oneself = 自活する","support group = サポートグループ"],output:{"SVO":[{en:"I support her decision.",jp:"私は彼女の決断を支持する。"},{en:"He supports his family.",jp:"彼は家族を養っている。"},{en:"Thank you for your support.",jp:"ご支援ありがとうございます。"}],"応用":[{en:"She supports herself through freelancing.",jp:"彼女はフリーランスで自活している。"},{en:"Which team do you support?",jp:"どのチームを応援していますか？"},{en:"Support your local businesses.",jp:"地元のビジネスを支援しよう。"}]}},
  create:{meaning:"作る / 創造する",forms:{"原形":"create","三単現":"creates","過去形":"created","過去分詞":"created","現在分詞":"creating"},patterns:{SV:null,SVO:{en:"She creates art.",jp:"彼女はアートを作る。"},SVOO:null,SVOC:null},exceptions:["create a scene = 騒ぎを起こす","create opportunities = 機会を作る"],output:{"SVO":[{en:"She creates beautiful paintings.",jp:"彼女は美しい絵を描く。"},{en:"He created a new app.",jp:"彼は新しいアプリを作った。"},{en:"Create a password.",jp:"パスワードを作成して。"}],"応用":[{en:"Create your own opportunities.",jp:"自分でチャンスを作れ。"},{en:"The project created many jobs.",jp:"そのプロジェクトは多くの雇用を生み出した。"},{en:"She created a scene at the restaurant.",jp:"彼女はレストランで騒ぎを起こした。"}]}},
  manage:{meaning:"管理する / うまくやる / なんとかする",forms:{"原形":"manage","三単現":"manages","過去形":"managed","過去分詞":"managed","現在分詞":"managing"},patterns:{SV:null,SVO:{en:"She manages a team.",jp:"彼女はチームを管理する。"},SVOO:null,SVOC:null},exceptions:["manage to = なんとか〜する","manage without = 〜なしでやっていく"],output:{"SVO":[{en:"She manages a team of ten.",jp:"彼女は10人のチームを管理する。"},{en:"He manages his time well.",jp:"彼は時間管理が上手だ。"},{en:"Can you manage it alone?",jp:"一人でできますか？"}],"応用":[{en:"I managed to finish on time.",jp:"なんとか時間通りに終わらせた。"},{en:"How do you manage without a car?",jp:"車なしでどうやってやっているの？"},{en:"She managed the crisis well.",jp:"彼女は危機をうまく乗り切った。"}]}},
  reduce:{meaning:"減らす / 削減する",forms:{"原形":"reduce","三単現":"reduces","過去形":"reduced","過去分詞":"reduced","現在分詞":"reducing"},patterns:{SV:null,SVO:{en:"Reduce your expenses.",jp:"支出を減らして。"},SVOO:null,SVOC:null},exceptions:["reduce to = 〜の状態に追い込む","reduce by = 〜だけ減らす"],output:{"SVO":[{en:"We need to reduce costs.",jp:"コストを削減する必要がある。"},{en:"Exercise reduces stress.",jp:"運動はストレスを軽減する。"},{en:"The price was reduced by 20%.",jp:"値段が20%引き下げられた。"}],"応用":[{en:"She was reduced to tears.",jp:"彼女は泣かされた。"},{en:"Reduce, reuse, recycle.",jp:"リデュース、リユース、リサイクル。"},{en:"They reduced the team size.",jp:"チームの規模を縮小した。"}]}},
  increase:{meaning:"増やす / 増える",forms:{"原形":"increase","三単現":"increases","過去形":"increased","過去分詞":"increased","現在分詞":"increasing"},patterns:{SV:{en:"Sales increased.",jp:"売上が増えた。"},SVO:{en:"Increase your speed.",jp:"スピードを上げて。"},SVOO:null,SVOC:null},exceptions:["increase by = 〜だけ増える","on the increase = 増加中である"],output:{"SV/SVO":[{en:"Sales increased by 10%.",jp:"売上が10%増えた。"},{en:"She increased her vocabulary.",jp:"彼女は語彙を増やした。"},{en:"Exercise increases energy levels.",jp:"運動はエネルギーレベルを高める。"}],"応用":[{en:"Crime is on the increase.",jp:"犯罪が増加している。"},{en:"We need to increase efficiency.",jp:"効率を上げる必要がある。"},{en:"The population has increased rapidly.",jp:"人口が急速に増えた。"}]}},
  improve:{meaning:"改善する / 上達する",forms:{"原形":"improve","三単現":"improves","過去形":"improved","過去分詞":"improved","現在分詞":"improving"},patterns:{SV:{en:"Her English is improving.",jp:"彼女の英語は上達している。"},SVO:{en:"Improve your skills.",jp:"スキルを磨いて。"},SVOO:null,SVOC:null},exceptions:["improve on = 〜をさらに良くする","room for improvement = 改善の余地がある"],output:{"SV/SVO":[{en:"Her English is improving rapidly.",jp:"彼女の英語は急速に上達している。"},{en:"We need to improve customer service.",jp:"顧客サービスを改善する必要がある。"},{en:"He improved his score.",jp:"彼はスコアを改善した。"}],"応用":[{en:"There's always room for improvement.",jp:"常に改善の余地がある。"},{en:"She improved on her previous record.",jp:"彼女は以前の記録を更新した。"},{en:"Keep improving.",jp:"成長し続けて。"}]}},
  protect:{meaning:"守る / 保護する",forms:{"原形":"protect","三単現":"protects","過去形":"protected","過去分詞":"protected","現在分詞":"protecting"},patterns:{SV:null,SVO:{en:"Protect the environment.",jp:"環境を守る。"},SVOO:null,SVOC:null},exceptions:["protect from/against = 〜から守る","protection = 保護（名詞）"],output:{"SVO":[{en:"Protect the environment.",jp:"環境を守って。"},{en:"She protects her children.",jp:"彼女は子供たちを守る。"},{en:"This cream protects your skin.",jp:"このクリームはあなたの肌を守る。"}],"応用":[{en:"Protect yourself from the sun.",jp:"日差しから身を守って。"},{en:"We must protect endangered species.",jp:"絶滅危惧種を保護しなければならない。"},{en:"The law protects workers' rights.",jp:"法律は労働者の権利を守る。"}]}},
  connect:{meaning:"つなぐ / 接続する",forms:{"原形":"connect","三単現":"connects","過去形":"connected","過去分詞":"connected","現在分詞":"connecting"},patterns:{SV:null,SVO:{en:"Connect the cables.",jp:"ケーブルをつないで。"},SVOO:null,SVOC:null},exceptions:["connect with = 〜とつながる・共感する","be connected to = 〜に接続されている"],output:{"SVO":[{en:"Connect the cables.",jp:"ケーブルをつないで。"},{en:"This flight connects to London.",jp:"この便はロンドンへの乗り継ぎがある。"},{en:"She connected with many people.",jp:"彼女は多くの人とつながった。"}],"応用":[{en:"Connect to the WiFi.",jp:"WiFiに接続して。"},{en:"The two cities are connected by train.",jp:"2つの都市は電車でつながっている。"},{en:"I really connected with that book.",jp:"その本にとても共感した。"}]}},
  develop:{meaning:"発展する / 開発する",forms:{"原形":"develop","三単現":"develops","過去形":"developed","過去分詞":"developed","現在分詞":"developing"},patterns:{SV:{en:"The situation developed quickly.",jp:"状況は急速に発展した。"},SVO:{en:"She develops software.",jp:"彼女はソフトウェアを開発する。"},SVOO:null,SVOC:null},exceptions:["develop a habit = 習慣をつける","developing country = 発展途上国"],output:{"SV/SVO":[{en:"She develops mobile apps.",jp:"彼女はモバイルアプリを開発する。"},{en:"The situation developed unexpectedly.",jp:"状況が予想外に展開した。"},{en:"He developed a new strategy.",jp:"彼は新しい戦略を開発した。"}],"応用":[{en:"Develop good habits early.",jp:"早いうちに良い習慣をつけて。"},{en:"The country is still developing.",jp:"その国はまだ発展途上だ。"},{en:"She developed a passion for art.",jp:"彼女は芸術への情熱を持つようになった。"}]}}
};

let currentVerb="be",quizScore=0,quizTotal=0,quizAnswered=false,quizPool=[],quizIndex=0;

function speak(text){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=0.9;window.speechSynthesis.speak(u);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function initSelect(){
  const sel=document.getElementById("verbSelect");
  Object.keys(VERBS).forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;sel.appendChild(o);});
  sel.addEventListener("change",()=>{currentVerb=sel.value;loadVerb(currentVerb);buildQuizPool();loadQuiz();});
}

function loadVerb(name){
  const d=VERBS[name];
  document.getElementById("verbWord").textContent=name;
  document.getElementById("verbMeaning").textContent=d.meaning;
  document.getElementById("speakWordBtn").onclick=()=>speak(name);
  const fg=document.getElementById("formsGrid");fg.innerHTML="";
  Object.entries(d.forms).forEach(([label,val])=>{const chip=document.createElement("div");chip.className="form-chip";chip.innerHTML=`<span class="form-chip-label">${esc(label)}</span><span class="form-chip-val">${esc(val)}</span>`;chip.addEventListener("click",()=>speak(val.split("/")[0]));fg.appendChild(chip);});
  const tbody=document.getElementById("patternsBody");tbody.innerHTML="";
  ["SV","SVO","SVOO","SVOC"].forEach(pat=>{const data=d.patterns[pat];const tr=document.createElement("tr");if(data){tr.innerHTML=`<td><span class="badge badge-yes">${esc(pat)}</span></td><td><div>${esc(data.en)}</div><div class="jp-text">${esc(data.jp)}</div></td><td><button class="speak-btn" style="font-size:.75rem;padding:5px 10px">🔊</button></td>`;tr.querySelector(".speak-btn").addEventListener("click",()=>speak(data.en));}else{tr.innerHTML=`<td><span class="badge badge-no">${esc(pat)}</span></td><td colspan="2" style="color:var(--muted);font-size:.82rem;font-style:italic">この文型は取らない</td>`;}tbody.appendChild(tr);});
  const exList=document.getElementById("exceptionList");exList.innerHTML="";
  (d.exceptions&&d.exceptions.length?d.exceptions:["特記事項なし"]).forEach(e=>{const li=document.createElement("li");li.textContent=e;exList.appendChild(li);});
  const outBody=document.getElementById("outputBody");outBody.innerHTML="";
  Object.entries(d.output).forEach(([groupLabel,sentences])=>{const group=document.createElement("div");group.className="output-group";group.innerHTML=`<div class="output-group-label">${esc(groupLabel)}</div>`;sentences.forEach(s=>{const row=document.createElement("div");row.className="sentence-row";row.innerHTML=`<div class="sentence-texts"><div class="sentence-en">${esc(s.en)}</div><div class="sentence-jp">${esc(s.jp)}</div></div><button class="speak-btn" style="font-size:.75rem;padding:5px 10px;flex-shrink:0">🔊</button>`;row.querySelector(".speak-btn").addEventListener("click",()=>speak(s.en));group.appendChild(row);});outBody.appendChild(group);});
}

function buildQuizPool(){
  const d=VERBS[currentVerb];const forms=Object.values(d.forms);quizPool=[];
  Object.values(d.output).forEach(sentences=>{sentences.forEach(s=>{let matched=null;for(const f of forms){const parts=f.split("/");for(const p of parts){if(new RegExp("\\b"+escRe(p)+"\\b","i").test(s.en)){matched=p;break;}}if(matched)break;}if(!matched)return;const distractors=[...new Set(forms.map(f=>f.split("/")[0]).filter(f=>f!==matched))].slice(0,3);const options=shuffle([matched,...distractors]);const blanked=s.en.replace(new RegExp("\\b"+escRe(matched)+"\\b","i"),"___");quizPool.push({blanked,jp:s.jp,answer:matched,options});});});
  quizPool=shuffle(quizPool);quizIndex=0;
}

function loadQuiz(){
  quizAnswered=false;
  const fb=document.getElementById("quizFeedback");fb.className="quiz-feedback";fb.textContent="";
  if(!quizPool.length){document.getElementById("quizText").textContent="クイズデータがありません。";document.getElementById("quizOptions").innerHTML="";return;}
  const q=quizPool[quizIndex%quizPool.length];
  document.getElementById("quizText").innerHTML=q.blanked.replace("___",`<span class="blank" id="blankSpan">${esc(q.answer)}</span>`);
  document.getElementById("blankSpan").style.color="transparent";
  document.getElementById("quizJp").textContent=q.jp;
  const optsEl=document.getElementById("quizOptions");optsEl.innerHTML="";
  q.options.forEach(opt=>{const btn=document.createElement("button");btn.className="quiz-opt";btn.textContent=opt;btn.addEventListener("click",()=>handleAnswer(opt,q.answer));optsEl.appendChild(btn);});
}

function handleAnswer(chosen,correct){
  if(quizAnswered)return;quizAnswered=true;quizTotal++;
  if(chosen===correct)quizScore++;
  document.querySelectorAll(".quiz-opt").forEach(btn=>{btn.disabled=true;if(btn.textContent===correct)btn.classList.add("correct");else if(btn.textContent===chosen&&chosen!==correct)btn.classList.add("wrong");});
  const blank=document.getElementById("blankSpan");if(blank){blank.style.color="";blank.classList.add("revealed");}
  const fb=document.getElementById("quizFeedback");
  fb.textContent=chosen===correct?"✓ 正解！":`✗ 不正解。正解は「${correct}」です。`;
  fb.className="quiz-feedback show "+(chosen===correct?"ok":"ng");
  document.getElementById("scoreNum").textContent=quizScore;
  document.getElementById("scoreDen").textContent=quizTotal;
  document.getElementById("progressBar").style.width=(quizTotal?(quizScore/quizTotal)*100:0)+"%";
  document.getElementById("progressLabel").textContent=`Quiz: ${quizScore}/${quizTotal}`;
}

window.addEventListener("DOMContentLoaded",()=>{
  initSelect();loadVerb(currentVerb);buildQuizPool();loadQuiz();
  document.getElementById("nextQuizBtn").addEventListener("click",()=>{quizIndex=(quizIndex+1)%quizPool.length;loadQuiz();});
  document.getElementById("resetQuizBtn").addEventListener("click",()=>{quizScore=0;quizTotal=0;quizIndex=0;quizPool=shuffle(quizPool);document.getElementById("scoreNum").textContent=0;document.getElementById("scoreDen").textContent=0;document.getElementById("progressBar").style.width="0%";document.getElementById("progressLabel").textContent="Quiz: 0/0";loadQuiz();});
});
</script>
