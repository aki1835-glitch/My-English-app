<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VerbLab">
<meta name="description" content="英語動詞・文法 学習アプリ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>英語動詞 学習テンプレート</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#5b8dee;--accent2:#e8a87c;--text:#e8eaf0;--muted:#7a7f99;--border:#2e3248;--good:#4caf7d;--bad:#e05f5f;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;padding:0 0 60px;}
  .header{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--border);padding:20px 24px 0;position:sticky;top:0;z-index:50;}
  .header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding-bottom:14px;}
  .logo{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--accent);letter-spacing:.02em;white-space:nowrap;}
  .logo em{font-style:italic;color:var(--accent2);}
  .progress-bar-wrap{background:var(--surface2);border-radius:99px;height:6px;flex:1;min-width:80px;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease;width:0%;}
  .progress-label{font-size:.7rem;color:var(--muted);white-space:nowrap;}
  .nav-area{max-width:860px;margin:0 auto;padding:0 24px;}
  .cat-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:0;}
  .cat-tab{background:transparent;border:1px solid var(--border);border-radius:8px 8px 0 0;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.08em;padding:7px 14px;text-transform:uppercase;transition:background .18s,color .18s,border-color .18s;white-space:nowrap;}
  .cat-tab:hover{border-color:var(--accent);color:var(--accent);}
  .cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .verb-grid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:12px 14px;}
  .verb-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .verb-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;padding:6px 13px;transition:background .15s,border-color .15s,transform .1s;}
  .verb-btn:hover{border-color:var(--accent);background:#1e2235;transform:translateY(-1px);}
  .verb-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pager{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .pager-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:.85rem;padding:6px 14px;transition:background .15s,border-color .15s;font-family:'DM Sans',sans-serif;}
  .pager-btn:hover:not(:disabled){border-color:var(--accent);background:#1e2235;}
  .pager-btn:disabled{opacity:.3;cursor:default;}
  .pager-info{font-size:.75rem;color:var(--muted);min-width:54px;text-align:center;}
  .main{max-width:860px;margin:0 auto;padding:28px 20px 0;}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .section-header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .section-num{width:22px;height:22px;background:var(--accent);border-radius:50%;font-size:.68rem;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
  .section-num.pv{background:var(--accent2);}
  .section-title{font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  .section-body{padding:18px;}
  .verb-hero{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .verb-word{font-family:'DM Serif Display',serif;font-size:2.8rem;color:var(--accent);line-height:1;}
  .verb-meaning{color:var(--muted);font-size:.88rem;margin-top:4px;}
  .speak-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;padding:7px 11px;transition:background .2s,transform .15s;display:flex;align-items:center;gap:5px;}
  .speak-btn:hover{background:var(--accent);border-color:var(--accent);transform:scale(1.04);}
  .forms-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .form-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:border-color .2s,background .2s;}
  .form-chip:hover{border-color:var(--accent);background:#1e2235;}
  .form-chip-label{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  .form-chip-val{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.05rem;color:var(--accent2);}
  .patterns-table{width:100%;border-collapse:collapse;}
  .patterns-table th{text-align:left;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);}
  .patterns-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.86rem;}
  .patterns-table tr:last-child td{border-bottom:none;}
  .patterns-table tr:hover td{background:var(--surface2);}
  .badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:.7rem;font-weight:500;letter-spacing:.05em;}
  .badge-yes{background:rgba(91,141,238,.15);color:var(--accent);border:1px solid rgba(91,141,238,.3);}
  .badge-no{background:rgba(224,95,95,.1);color:var(--bad);border:1px solid rgba(224,95,95,.2);}
  .jp-text{color:var(--muted);font-size:.8rem;margin-top:3px;}
  .exception-list{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .exception-list li{background:rgba(232,168,124,.08);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:8px 13px;font-size:.83rem;color:var(--accent2);}
  .output-group{margin-bottom:20px;}
  .output-group:last-child{margin-bottom:0;}
  .output-group-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .output-group-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .sentence-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .sentence-row:last-child{border-bottom:none;}
  .sentence-texts{flex:1;}
  .sentence-en{font-size:.9rem;color:var(--text);}
  .sentence-jp{font-size:.76rem;color:var(--muted);margin-top:3px;}
  /* phrasal verbs in section 6 */
  .pv-list{display:flex;flex-direction:column;gap:14px;}
  .pv-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .pv-item-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
  .pv-phrase{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.15rem;color:var(--accent2);}
  .pv-meaning-tag{font-size:.75rem;color:var(--muted);margin-left:4px;}
  .pv-examples{padding:10px 14px;display:flex;flex-direction:column;gap:7px;}
  .pv-ex{display:flex;align-items:flex-start;gap:8px;}
  .pv-ex-texts{flex:1;}
  .pv-ex-en{font-size:.86rem;color:var(--text);}
  .pv-ex-jp{font-size:.74rem;color:var(--muted);margin-top:2px;}
  /* quiz */
  .quiz-question{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;}
  .quiz-q-label{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .quiz-q-text{font-size:.96rem;color:var(--text);line-height:1.6;}
  .blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--accent);margin:0 4px;color:transparent;user-select:none;}
  .blank.revealed{color:var(--accent2);border-color:var(--accent2);}
  .quiz-jp{font-size:.78rem;color:var(--muted);margin-top:6px;}
  .quiz-options{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .quiz-opt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--text);cursor:pointer;transition:background .18s,border-color .18s,transform .1s;}
  .quiz-opt:hover:not(:disabled){border-color:var(--accent);background:#1e2235;transform:translateY(-1px);}
  .quiz-opt:disabled{cursor:default;opacity:.7;}
  .quiz-opt.correct{background:rgba(76,175,125,.15);border-color:var(--good);color:var(--good);}
  .quiz-opt.wrong{background:rgba(224,95,95,.12);border-color:var(--bad);color:var(--bad);}
  .quiz-feedback{font-size:.8rem;padding:8px 13px;border-radius:8px;margin-bottom:10px;display:none;}
  .quiz-feedback.show{display:block;}
  .quiz-feedback.ok{background:rgba(76,175,125,.1);color:var(--good);border:1px solid rgba(76,175,125,.2);}
  .quiz-feedback.ng{background:rgba(224,95,95,.08);color:var(--bad);border:1px solid rgba(224,95,95,.2);}
  .quiz-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .btn-primary{background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;padding:9px 18px;transition:opacity .2s,transform .15s;}
  .btn-primary:hover{opacity:.88;transform:translateY(-1px);}
  .btn-secondary{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:9px 18px;transition:border-color .2s,color .2s;}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .score-display{display:flex;align-items:center;gap:7px;font-size:.76rem;color:var(--muted);margin-left:auto;}
  .score-num{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--accent2);}
  @media(max-width:580px){.verb-word{font-size:2rem;}.patterns-table th:nth-child(3),.patterns-table td:nth-child(3){display:none;}.section-body{padding:14px;}}
  /* mode switch */
  .mode-switch{display:flex;gap:6px;margin-left:auto;}
  .mode-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;padding:6px 14px;transition:background .18s,color .18s,border-color .18s;white-space:nowrap;}
  .mode-btn:hover{border-color:var(--accent);color:var(--accent);}
  .mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .mode-btn.prep-active{background:#6c9e6e;border-color:#6c9e6e;color:#fff;}
  .mode-btn.conj-active{background:#9b7fa3;border-color:#9b7fa3;color:#fff;}
  .mode-btn.adv-active{background:#e8a87c;border-color:#e8a87c;color:#fff;}
  .mode-btn.modal-active{background:#5ba3a0;border-color:#5ba3a0;color:#fff;}
  .hidden{display:none!important;}
  /* generic grammar nav/card (conj/adv/modal) */
  .gram-nav{max-width:860px;margin:0 auto;padding:0 24px;}
  .gram-cat-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:0;}
  .gram-cat-tab{background:transparent;border:1px solid var(--border);border-radius:8px 8px 0 0;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.08em;padding:7px 14px;text-transform:uppercase;transition:background .18s,color .18s,border-color .18s;white-space:nowrap;}
  .gram-grid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:12px 14px;}
  .gram-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .gram-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;padding:5px 12px;transition:background .15s,border-color .15s,transform .1s;}
  .gram-btn:hover{transform:translateY(-1px);}
  .gram-main{max-width:860px;margin:0 auto;padding:28px 20px 0;}
  .gram-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;animation:fadeUp .4s ease both;}
  .gram-card-header{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap;}
  .gram-word{font-family:'DM Serif Display',serif;font-size:2.4rem;line-height:1;}
  .gram-type-badge{border-radius:6px;font-size:.68rem;font-weight:500;letter-spacing:.1em;padding:3px 10px;text-transform:uppercase;border:1px solid;}
  .gram-meaning{color:var(--muted);font-size:.85rem;margin-top:3px;}
  .gram-card-body{padding:18px 20px;}
  .gram-usage-group{margin-bottom:20px;}
  .gram-usage-group:last-child{margin-bottom:0;}
  .gram-usage-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .gram-usage-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .gram-ex-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .gram-ex-row:last-child{border-bottom:none;}
  .gram-ex-texts{flex:1;}
  .gram-ex-en{font-size:.88rem;color:var(--text);}
  .gram-ex-jp{font-size:.75rem;color:var(--muted);margin-top:2px;}
  .gram-note{border-left:3px solid;border-radius:0 8px 8px 0;font-size:.82rem;margin-top:12px;padding:9px 14px;}
  /* collocation section */
  .coll-section{display:flex;flex-direction:column;gap:12px;}
  .coll-group{margin-bottom:4px;}
  .coll-group-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#c47eb5;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .coll-group-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .coll-items{display:flex;flex-direction:column;gap:0;}
  .coll-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .coll-row:last-child{border-bottom:none;}
  .coll-texts{flex:1;}
  .coll-phrase{font-size:.95rem;color:var(--text);}
  .coll-phrase strong{color:#c47eb5;font-family:'DM Serif Display',serif;font-style:italic;}
  .coll-meaning{font-size:.75rem;color:var(--muted);margin-top:2px;}
  .coll-example{font-size:.78rem;color:var(--muted);margin-top:3px;font-style:italic;}
  .section-num.coll{background:#c47eb5;}
  /* preposition section */
  .prep-nav{max-width:860px;margin:0 auto;padding:0 24px;}
  .prep-cat-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:0;}
  .prep-cat-tab{background:transparent;border:1px solid var(--border);border-radius:8px 8px 0 0;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.08em;padding:7px 14px;text-transform:uppercase;transition:background .18s,color .18s,border-color .18s;white-space:nowrap;}
  .prep-cat-tab:hover{border-color:#6c9e6e;color:#6c9e6e;}
  .prep-cat-tab.active{background:#6c9e6e;border-color:#6c9e6e;color:#fff;}
  .prep-grid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:12px 14px;}
  .prep-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .prep-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;padding:5px 12px;transition:background .15s,border-color .15s,transform .1s;}
  .prep-btn:hover{border-color:#6c9e6e;background:#1a2520;transform:translateY(-1px);}
  .prep-btn.active{background:#6c9e6e;border-color:#6c9e6e;color:#fff;}
  .prep-pager{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .prep-main{max-width:860px;margin:0 auto;padding:28px 20px 0;}
  .prep-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;animation:fadeUp .4s ease both;}
  .prep-card-header{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap;}
  .prep-word{font-family:'DM Serif Display',serif;font-size:2.4rem;color:#6c9e6e;line-height:1;}
  .prep-type-badge{background:rgba(108,158,110,.15);border:1px solid rgba(108,158,110,.3);border-radius:6px;color:#6c9e6e;font-size:.68rem;font-weight:500;letter-spacing:.1em;padding:3px 10px;text-transform:uppercase;}
  .prep-meaning{color:var(--muted);font-size:.85rem;margin-top:3px;}
  .prep-card-body{padding:18px 20px;}
  .prep-usage-group{margin-bottom:20px;}
  .prep-usage-group:last-child{margin-bottom:0;}
  .prep-usage-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6c9e6e;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .prep-usage-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .prep-ex-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .prep-ex-row:last-child{border-bottom:none;}
  .prep-ex-texts{flex:1;}
  .prep-ex-en{font-size:.88rem;color:var(--text);}
  .prep-ex-jp{font-size:.75rem;color:var(--muted);margin-top:2px;}
  .prep-note{background:rgba(108,158,110,.07);border-left:3px solid #6c9e6e;border-radius:0 8px 8px 0;color:#6c9e6e;font-size:.82rem;margin-top:12px;padding:9px 14px;}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">Verb<em>Lab</em></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">Quiz: 0/0</div>
    <div class="mode-switch">
      <button class="mode-btn active" id="modeVerbBtn">📚 動詞</button>
      <button class="mode-btn" id="modePrepBtn">📌 前置詞</button>
      <button class="mode-btn" id="modeConjBtn">🔗 接続詞</button>
      <button class="mode-btn" id="modeAdvBtn">💡 副詞</button>
      <button class="mode-btn" id="modeModalBtn">⚙️ 助動詞</button>
    </div>
  </div>
  <div id="verbNavWrap">
    <div class="nav-area">
      <div class="cat-tabs" id="catTabs"></div>
      <div class="verb-grid-wrap">
        <div class="verb-grid" id="verbGrid"></div>
        <div class="pager">
          <button class="pager-btn" id="prevBtn">← 前</button>
          <span class="pager-info" id="pagerInfo"></span>
          <button class="pager-btn" id="nextBtn">次 →</button>
        </div>
      </div>
    </div>
  </div>
  <div id="prepNavWrap" class="hidden">
    <div class="prep-nav">
      <div class="prep-cat-tabs" id="prepCatTabs"></div>
      <div class="prep-grid-wrap">
        <div class="prep-grid" id="prepGrid"></div>
        <div class="prep-pager">
          <button class="pager-btn" id="prepPrevBtn">← 前</button>
          <span class="pager-info" id="prepPagerInfo"></span>
          <button class="pager-btn" id="prepNextBtn">次 →</button>
        </div>
      </div>
    </div>
  </div>
  <div id="conjNavWrap" class="hidden">
    <div class="gram-nav"><div class="gram-cat-tabs" id="conjCatTabs"></div><div class="gram-grid-wrap"><div class="gram-grid" id="conjGrid"></div><div class="prep-pager"><button class="pager-btn" id="conjPrevBtn">← 前</button><span class="pager-info" id="conjPagerInfo"></span><button class="pager-btn" id="conjNextBtn">次 →</button></div></div></div>
  </div>
  <div id="advNavWrap" class="hidden">
    <div class="gram-nav"><div class="gram-cat-tabs" id="advCatTabs"></div><div class="gram-grid-wrap"><div class="gram-grid" id="advGrid"></div><div class="prep-pager"><button class="pager-btn" id="advPrevBtn">← 前</button><span class="pager-info" id="advPagerInfo"></span><button class="pager-btn" id="advNextBtn">次 →</button></div></div></div>

<script>
const VERBS={
  be:{meaning:"〜である / いる / ある",forms:{"原形":"be","三単現":"is","過去形":"was/were","過去分詞":"been","現在分詞":"being"},patterns:{SV:{en:"She is here.",jp:"彼女はここにいる。"},SVO:null,SVOO:null,SVOC:{en:"He is a doctor.",jp:"彼は医者だ。"}},exceptions:["am/is/are（現在）、was/were（過去）と不規則変化","受動態・進行形で助動詞として使われる"],output:{"SV":[{en:"She is here.",jp:"彼女はここにいる。"},{en:"They were at school.",jp:"彼らは学校にいた。"},{en:"The keys are on the table.",jp:"鍵はテーブルの上にある。"}],"SVOC":[{en:"He is a doctor.",jp:"彼は医者だ。"},{en:"The weather is beautiful today.",jp:"今日の天気は素晴らしい。"},{en:"I am happy.",jp:"私は幸せだ。"}]},pv:[{phrase:"be up to",meaning:"〜をたくらんでいる / 〜次第だ",examples:[{en:"What are you up to?",jp:"何をしているの？"},{en:"It's up to you.",jp:"あなた次第だ。"}]},{phrase:"be into",meaning:"〜に夢中だ",examples:[{en:"She is really into yoga.",jp:"彼女はヨガに夢中だ。"},{en:"Are you into music?",jp:"音楽が好きですか？"}]},{phrase:"be over",meaning:"終わっている",examples:[{en:"The meeting is over.",jp:"会議は終わった。"},{en:"It's all over.",jp:"すべて終わった。"}]}]},
  have:{meaning:"持つ / 経験する",forms:{"原形":"have","三単現":"has","過去形":"had","過去分詞":"had","現在分詞":"having"},patterns:{SV:null,SVO:{en:"I have a car.",jp:"私は車を持っている。"},SVOO:null,SVOC:{en:"I have him clean the room.",jp:"私は彼に部屋を掃除させる。"}},exceptions:['"have got" = 持っている（口語）',"完了形で重要：have + 過去分詞","使役動詞：have + O + 動詞原形"],output:{"SVO":[{en:"I have a car.",jp:"私は車を持っている。"},{en:"She has a dog.",jp:"彼女は犬を持っている。"},{en:"We have many books.",jp:"私たちは多くの本を持っている。"}],"応用（完了形）":[{en:"I have finished my work.",jp:"私は仕事を終えた。"},{en:"I have been studying English for years.",jp:"私は何年も英語を勉強している。"},{en:"Have you ever had sushi?",jp:"寿司を食べたことがありますか？"}]},pv:[{phrase:"have on",meaning:"着ている / 予定がある",examples:[{en:"She has a red coat on.",jp:"彼女は赤いコートを着ている。"},{en:"Do you have anything on tonight?",jp:"今夜何か予定がありますか？"}]},{phrase:"have out",meaning:"取り出す / はっきり話し合う",examples:[{en:"Let's have it out.",jp:"はっきり話し合いましょう。"},{en:"She had her tooth out.",jp:"彼女は歯を抜いた。"}]},{phrase:"have over",meaning:"（人を）招待する",examples:[{en:"We had friends over for dinner.",jp:"夕食に友人を招いた。"},{en:"Let's have them over.",jp:"彼らを招待しましょう。"}]}]},
  do:{meaning:"する / 行う",forms:{"原形":"do","三単現":"does","過去形":"did","過去分詞":"done","現在分詞":"doing"},patterns:{SV:null,SVO:{en:"I do my homework.",jp:"私は宿題をする。"},SVOO:null,SVOC:null},exceptions:["助動詞として疑問文・否定文を作る","do well / do badly = うまくいく・うまくいかない"],output:{"SVO":[{en:"I do my homework.",jp:"私は宿題をする。"},{en:"She does yoga every morning.",jp:"彼女は毎朝ヨガをする。"},{en:"We did our best.",jp:"私たちは最善を尽くした。"}],"応用":[{en:"Do you speak English?",jp:"あなたは英語を話しますか？"},{en:"I don't know the answer.",jp:"私は答えを知らない。"},{en:"She did well on the test.",jp:"彼女はテストでよくできた。"}]},pv:[{phrase:"do away with",meaning:"廃止する / 取り除く",examples:[{en:"They did away with the old rule.",jp:"彼らは古いルールを廃止した。"},{en:"Let's do away with this custom.",jp:"この慣習をなくしましょう。"}]},{phrase:"do up",meaning:"修繕する / 飾る / 締める",examples:[{en:"They did up the old house.",jp:"彼らは古い家を修繕した。"},{en:"Do up your shoelaces.",jp:"靴ひもを結んで。"}]},{phrase:"do without",meaning:"〜なしで済ます",examples:[{en:"I can't do without coffee.",jp:"コーヒーなしでは過ごせない。"},{en:"We'll have to do without it.",jp:"それなしでやっていかなければならない。"}]}]},
  make:{meaning:"作る / 〜にする",forms:{"原形":"make","三単現":"makes","過去形":"made","過去分詞":"made","現在分詞":"making"},patterns:{SV:null,SVO:{en:"I make a cake.",jp:"私はケーキを作る。"},SVOO:{en:"I make you a cake.",jp:"あなたにケーキを作る。"},SVOC:{en:"I make him happy.",jp:"彼を幸せにする。"}},exceptions:["使役動詞：make + O + 動詞原形（強制）","make it = うまくやる・間に合う"],output:{"SVO":[{en:"I make a cake.",jp:"私はケーキを作る。"},{en:"She makes dinner every day.",jp:"彼女は毎日夕食を作る。"},{en:"We make plans together.",jp:"私たちは一緒に計画を立てる。"}],"SVOC":[{en:"I make him happy.",jp:"私は彼を幸せにする。"},{en:"The news made her sad.",jp:"そのニュースは彼女を悲しくさせた。"},{en:"Hard work makes you stronger.",jp:"努力はあなたを強くする。"}]},pv:[{phrase:"make up",meaning:"作り上げる / 仲直りする / 占める",examples:[{en:"She made up a story.",jp:"彼女は話を作り上げた。"},{en:"They made up after the fight.",jp:"口論の後仲直りした。"}]},{phrase:"make out",meaning:"理解する / うまくやる",examples:[{en:"I can't make out what he said.",jp:"彼が言ったことが理解できない。"},{en:"How did you make out?",jp:"どうだった？"}]},{phrase:"make up for",meaning:"埋め合わせる",examples:[{en:"I'll make up for lost time.",jp:"失った時間を取り戻す。"},{en:"Nothing can make up for it.",jp:"何もそれを埋め合わせることはできない。"}]}]},
  get:{meaning:"得る / 〜になる / 着く",forms:{"原形":"get","三単現":"gets","過去形":"got","過去分詞":"gotten/got","現在分詞":"getting"},patterns:{SV:{en:"I get there by bus.",jp:"私はバスでそこに着く。"},SVO:{en:"I get a gift.",jp:"私はプレゼントをもらう。"},SVOO:{en:"I get you a seat.",jp:"あなたに席を取る。"},SVOC:{en:"I get him to work.",jp:"彼に仕事をさせる。"}},exceptions:["get + 形容詞 = 〜になる（get tired / get better）","使役：get + O + to不定詞"],output:{"SVO":[{en:"I got a new job.",jp:"私は新しい仕事を得た。"},{en:"She gets good grades.",jp:"彼女は良い成績を取る。"},{en:"We got the news.",jp:"私たちはそのニュースを聞いた。"}],"応用":[{en:"I got tired after work.",jp:"仕事の後に疲れた。"},{en:"She got better quickly.",jp:"彼女はすぐに良くなった。"},{en:"He got her to sign the form.",jp:"彼は彼女に書類にサインさせた。"}]},pv:[{phrase:"get up",meaning:"起きる / 立ち上がる",examples:[{en:"I get up at 6 every day.",jp:"毎日6時に起きる。"},{en:"Get up, it's late!",jp:"起きて、遅いよ！"}]},{phrase:"get over",meaning:"回復する / 乗り越える",examples:[{en:"She got over her illness quickly.",jp:"彼女はすぐに病気から回復した。"},{en:"It takes time to get over a breakup.",jp:"別れを乗り越えるには時間がかかる。"}]},{phrase:"get along",meaning:"仲良くやる / うまくいく",examples:[{en:"Do you get along with your boss?",jp:"上司とうまくやっていますか？"},{en:"They get along well.",jp:"彼らは仲良くやっている。"}]},{phrase:"get away",meaning:"逃げる / 休暇を取る",examples:[{en:"He got away from the crowd.",jp:"彼は群衆から逃げた。"},{en:"We need to get away for a while.",jp:"しばらく休暇が必要だ。"}]}]},
  take:{meaning:"取る / 連れて行く / かかる",forms:{"原形":"take","三単現":"takes","過去形":"took","過去分詞":"taken","現在分詞":"taking"},patterns:{SV:null,SVO:{en:"I take a bus.",jp:"私はバスに乗る。"},SVOO:{en:"I take him a message.",jp:"彼にメッセージを持っていく。"},SVOC:null},exceptions:["It takes + 時間 = 〜の時間がかかる","take + O + to場所 = Oを〜へ連れて行く"],output:{"SVO":[{en:"I take a bus to work.",jp:"私はバスで通勤する。"},{en:"She took a photo.",jp:"彼女は写真を撮った。"},{en:"He takes a walk every evening.",jp:"彼は毎晩散歩する。"}],"応用":[{en:"It takes two hours to get there.",jp:"そこに着くのに2時間かかる。"},{en:"She took me to the hospital.",jp:"彼女は私を病院に連れて行った。"},{en:"Take your time.",jp:"ゆっくりどうぞ。"}]},pv:[{phrase:"take off",meaning:"離陸する / 脱ぐ / 急成長する",examples:[{en:"The plane takes off at noon.",jp:"飛行機は正午に離陸する。"},{en:"Her career took off quickly.",jp:"彼女のキャリアは急成長した。"}]},{phrase:"take on",meaning:"引き受ける / 雇う",examples:[{en:"He took on a new challenge.",jp:"彼は新たな挑戦を引き受けた。"},{en:"We are taking on new staff.",jp:"新しいスタッフを雇っている。"}]},{phrase:"take over",meaning:"引き継ぐ / 乗っ取る",examples:[{en:"She took over the business.",jp:"彼女はビジネスを引き継いだ。"},{en:"He took over as manager.",jp:"彼はマネージャーを引き継いだ。"}]},{phrase:"take up",meaning:"始める / 占める",examples:[{en:"She took up yoga last year.",jp:"彼女は昨年ヨガを始めた。"},{en:"This table takes up too much space.",jp:"このテーブルは場所を取りすぎる。"}]}]},
  give:{meaning:"与える / 渡す",forms:{"原形":"give","三単現":"gives","過去形":"gave","過去分詞":"given","現在分詞":"giving"},patterns:{SV:null,SVO:{en:"I give money.",jp:"私はお金を渡す。"},SVOO:{en:"I give her a book.",jp:"私は彼女に本をあげる。"},SVOC:null},exceptions:["give up = あきらめる","give in = 従う・折れる"],output:{"SVOO":[{en:"I gave her a book.",jp:"私は彼女に本をあげた。"},{en:"He gave me good advice.",jp:"彼は私に良いアドバイスをくれた。"},{en:"Give me a call later.",jp:"後で電話して。"}],"応用":[{en:"Don't give up.",jp:"あきらめないで。"},{en:"She gave a speech.",jp:"彼女はスピーチをした。"},{en:"Give it a try.",jp:"試してみて。"}]},pv:[{phrase:"give up",meaning:"あきらめる",examples:[{en:"Don't give up on your dreams.",jp:"夢をあきらめないで。"},{en:"She gave up smoking.",jp:"彼女は喫煙をやめた。"}]},{phrase:"give in",meaning:"従う / 折れる",examples:[{en:"She finally gave in.",jp:"彼女はついに折れた。"},{en:"Don't give in to pressure.",jp:"プレッシャーに屈しないで。"}]},{phrase:"give away",meaning:"ただで配る / 秘密を漏らす",examples:[{en:"She gave away her old clothes.",jp:"彼女は古い服を配った。"},{en:"Don't give away the secret.",jp:"秘密を漏らさないで。"}]},{phrase:"give out",meaning:"配布する / 尽きる",examples:[{en:"He gave out flyers.",jp:"彼はチラシを配った。"},{en:"Her energy gave out.",jp:"彼女の体力が尽きた。"}]}]},
  know:{meaning:"知っている / わかる",forms:{"原形":"know","三単現":"knows","過去形":"knew","過去分詞":"known","現在分詞":"knowing"},patterns:{SV:null,SVO:{en:"I know the answer.",jp:"私は答えを知っている。"},SVOO:null,SVOC:null},exceptions:["状態動詞のため進行形にしない","You know = ほら・つまり（口語）"],output:{"SVO":[{en:"I know the answer.",jp:"私は答えを知っている。"},{en:"She knows how to cook.",jp:"彼女は料理の仕方を知っている。"},{en:"Do you know him?",jp:"あなたは彼を知っていますか？"}],"応用":[{en:"I knew it would rain.",jp:"雨が降るとわかっていた。"},{en:"Let me know if you need help.",jp:"助けが必要なら教えて。"},{en:"She is known as a great singer.",jp:"彼女は偉大な歌手として知られている。"}]},pv:[{phrase:"know about",meaning:"〜について知っている",examples:[{en:"Do you know about this?",jp:"これについて知っていますか？"},{en:"She knows a lot about history.",jp:"彼女は歴史についてよく知っている。"}]},{phrase:"know of",meaning:"〜の存在を知っている",examples:[{en:"I know of him but we've never met.",jp:"彼のことは知っているが会ったことはない。"},{en:"Do you know of any good restaurants?",jp:"良いレストランを知っていますか？"}]}]},
  think:{meaning:"思う / 考える",forms:{"原形":"think","三単現":"thinks","過去形":"thought","過去分詞":"thought","現在分詞":"thinking"},patterns:{SV:null,SVO:{en:"I think about it.",jp:"私はそれについて考える。"},SVOO:null,SVOC:{en:"I think him smart.",jp:"私は彼が賢いと思う。"}},exceptions:["think of = 〜を思いつく","think about = 〜について考える"],output:{"SVO":[{en:"I think about the future.",jp:"私は将来について考える。"},{en:"What do you think?",jp:"あなたはどう思いますか？"},{en:"I was thinking about you.",jp:"あなたのことを考えていた。"}],"応用":[{en:"I think it will be fine.",jp:"大丈夫だと思う。"},{en:"Think carefully before deciding.",jp:"決める前によく考えて。"},{en:"She thinks of a good idea.",jp:"彼女は良いアイデアを思いつく。"}]},pv:[{phrase:"think over",meaning:"じっくり考える",examples:[{en:"Think it over before deciding.",jp:"決める前にじっくり考えて。"},{en:"Let me think it over.",jp:"じっくり考えさせてください。"}]},{phrase:"think through",meaning:"徹底的に考える",examples:[{en:"Think through the consequences.",jp:"結果をよく考えて。"},{en:"She thought it through carefully.",jp:"彼女は慎重に考え抜いた。"}]},{phrase:"think up",meaning:"考え出す / 思いつく",examples:[{en:"He thought up a clever plan.",jp:"彼は賢い計画を思いついた。"},{en:"Can you think up a solution?",jp:"解決策を思いつけますか？"}]}]},
  say:{meaning:"言う / 述べる",forms:{"原形":"say","三単現":"says","過去形":"said","過去分詞":"said","現在分詞":"saying"},patterns:{SV:null,SVO:{en:"She says hello.",jp:"彼女はこんにちはと言う。"},SVOO:null,SVOC:null},exceptions:["say to + 人 = 〜に言う","They say (that)... = 〜と言われている"],output:{"SVO":[{en:"She says hello to everyone.",jp:"彼女はみんなにこんにちはと言う。"},{en:"He said nothing.",jp:"彼は何も言わなかった。"},{en:"What did you say?",jp:"何と言いましたか？"}],"応用":[{en:"They say it will snow tomorrow.",jp:"明日雪が降ると言われている。"},{en:"Say it again, please.",jp:"もう一度言ってください。"},{en:"It goes without saying.",jp:"言うまでもない。"}]},pv:[{phrase:"say out",meaning:"はっきり言う",examples:[{en:"Say it out loud.",jp:"はっきり声に出して言って。"},{en:"Don't be afraid to say it out.",jp:"はっきり言うことを恐れないで。"}]},{phrase:"say over",meaning:"繰り返し言う / 唱える",examples:[{en:"Say it over and over.",jp:"何度も繰り返して言って。"},{en:"She said the words over.",jp:"彼女はその言葉を繰り返した。"}]}]},
  tell:{meaning:"伝える / 話す / 命じる",forms:{"原形":"tell","三単現":"tells","過去形":"told","過去分詞":"told","現在分詞":"telling"},patterns:{SV:null,SVO:null,SVOO:{en:"I tell her the truth.",jp:"私は彼女に真実を伝える。"},SVOC:{en:"I tell him to stop.",jp:"私は彼に止まるよう言う。"}},exceptions:["tell + O + to不定詞 = Oに〜するよう言う","tell A from B = AとBを区別する"],output:{"SVOO":[{en:"I told her the truth.",jp:"私は彼女に真実を伝えた。"},{en:"He tells us stories.",jp:"彼は私たちに話をしてくれる。"},{en:"Please tell me your name.",jp:"名前を教えてください。"}],"SVOC":[{en:"She told him to be quiet.",jp:"彼女は彼に静かにするよう言った。"},{en:"Tell me what happened.",jp:"何が起きたか教えて。"},{en:"I told you so.",jp:"だから言ったでしょう。"}]},pv:[{phrase:"tell off",meaning:"叱る / 怒鳴りつける",examples:[{en:"She told him off for being late.",jp:"彼女は彼の遅刻を叱った。"},{en:"The teacher told me off.",jp:"先生に怒られた。"}]},{phrase:"tell apart",meaning:"区別する",examples:[{en:"I can't tell them apart.",jp:"彼らを区別できない。"},{en:"Can you tell the twins apart?",jp:"双子を区別できますか？"}]},{phrase:"tell on",meaning:"告げ口する",examples:[{en:"Don't tell on me!",jp:"告げ口しないで！"},{en:"She told on her brother.",jp:"彼女は兄を告げ口した。"}]}]},

const CATEGORIES={"基本動詞":["be","have","do","make","get","take","give","keep","let","put"],"思考・感情":["think","feel","know","believe","understand","remember","forget","love","like","hate","hope","wish","want","seem","expect"],"コミュニケーション":["say","tell","speak","ask","write","read","listen","show","call","explain","discuss","suggest","agree","disagree"],"移動・動作":["come","go","run","walk","move","turn","stand","sit","lie","fall","rise","bring","send","leave","stay"],"生活・日常":["eat","drink","sleep","work","live","play","use","find","help","try","start","need","wait","buy","sell","pay","spend","meet","join"],"成長・変化":["learn","teach","study","grow","change","open","close","win","lose","develop","improve","increase","reduce","create","manage","protect","connect","support","include","allow","consider","decide","choose"]};
let currentVerb="be",activeCat="基本動詞",quizScore=0,quizTotal=0,quizAnswered=false,quizPool=[],quizIndex=0;

function speak(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.9;window.speechSynthesis.speak(u);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function initNav(){
  const catTabs=document.getElementById("catTabs"),verbGrid=document.getElementById("verbGrid"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn"),pagerInfo=document.getElementById("pagerInfo");
  function currentList(){return CATEGORIES[activeCat]||[];}
  function currentIdx(){return currentList().indexOf(currentVerb);}
  function updatePager(){const list=currentList(),idx=currentIdx(),inCat=idx>=0;prevBtn.disabled=!inCat||idx===0;nextBtn.disabled=!inCat||idx===list.length-1;pagerInfo.textContent=inCat?(idx+1)+"/"+list.length:"";}
  function selectVerb(v){currentVerb=v;renderVerbs();loadVerb(v);buildQuizPool();loadQuiz();}
  function renderCats(){catTabs.innerHTML="";Object.keys(CATEGORIES).forEach(cat=>{const btn=document.createElement("button");btn.className="cat-tab"+(cat===activeCat?" active":"");btn.textContent=cat;btn.addEventListener("click",()=>{activeCat=cat;renderCats();selectVerb(CATEGORIES[cat][0]);});catTabs.appendChild(btn);});}
  function renderVerbs(){verbGrid.innerHTML="";currentList().forEach(v=>{const btn=document.createElement("button");btn.className="verb-btn"+(v===currentVerb?" active":"");btn.textContent=v;btn.addEventListener("click",()=>selectVerb(v));verbGrid.appendChild(btn);});updatePager();}
  prevBtn.addEventListener("click",()=>{const idx=currentIdx();if(idx>0)selectVerb(currentList()[idx-1]);});
  nextBtn.addEventListener("click",()=>{const idx=currentIdx(),list=currentList();if(idx<list.length-1)selectVerb(list[idx+1]);});
  document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;if(e.key==="ArrowLeft"&&!prevBtn.disabled)prevBtn.click();if(e.key==="ArrowRight"&&!nextBtn.disabled)nextBtn.click();});
  renderCats();renderVerbs();
  window._renderVerbBtns=renderVerbs;
}

function loadVerb(name){
  const d=VERBS[name];
  if(window._renderVerbBtns)window._renderVerbBtns();
  document.getElementById("verbWord").textContent=name;
  document.getElementById("verbMeaning").textContent=d.meaning;
  document.getElementById("speakWordBtn").onclick=()=>speak(name);
  const fg=document.getElementById("formsGrid");fg.innerHTML="";
  Object.entries(d.forms).forEach(([label,val])=>{const chip=document.createElement("div");chip.className="form-chip";chip.innerHTML=`<span class="form-chip-label">${esc(label)}</span><span class="form-chip-val">${esc(val)}</span>`;chip.addEventListener("click",()=>speak(val.split("/")[0]));fg.appendChild(chip);});
  const tbody=document.getElementById("patternsBody");tbody.innerHTML="";

function buildQuizPool(){
  const d=VERBS[currentVerb];const forms=Object.values(d.forms);quizPool=[];
  Object.values(d.output).forEach(sentences=>{sentences.forEach(s=>{let matched=null;for(const f of forms){const parts=f.split("/");for(const p of parts){if(new RegExp("\\b"+escRe(p)+"\\b","i").test(s.en)){matched=p;break;}}if(matched)break;}if(!matched)return;const distractors=[...new Set(forms.map(f=>f.split("/")[0]).filter(f=>f!==matched))].slice(0,3);const options=shuffle([matched,...distractors]);const blanked=s.en.replace(new RegExp("\\b"+escRe(matched)+"\\b","i"),"___");quizPool.push({blanked,jp:s.jp,answer:matched,options});});});
  quizPool=shuffle(quizPool);quizIndex=0;
}

function loadQuiz(){
  quizAnswered=false;const fb=document.getElementById("quizFeedback");fb.className="quiz-feedback";fb.textContent="";
  if(!quizPool.length){document.getElementById("quizText").textContent="クイズデータがありません。";document.getElementById("quizOptions").innerHTML="";return;}
  const q=quizPool[quizIndex%quizPool.length];
  document.getElementById("quizText").innerHTML=q.blanked.replace("___",`<span class="blank" id="blankSpan">${esc(q.answer)}</span>`);
  document.getElementById("blankSpan").style.color="transparent";
  document.getElementById("quizJp").textContent=q.jp;
  const optsEl=document.getElementById("quizOptions");optsEl.innerHTML="";
  q.options.forEach(opt=>{const btn=document.createElement("button");btn.className="quiz-opt";btn.textContent=opt;btn.addEventListener("click",()=>handleAnswer(opt,q.answer));optsEl.appendChild(btn);});
}

function handleAnswer(chosen,correct){
  if(quizAnswered)return;quizAnswered=true;quizTotal++;
  if(chosen===correct)quizScore++;
  document.querySelectorAll(".quiz-opt").forEach(btn=>{btn.disabled=true;if(btn.textContent===correct)btn.classList.add("correct");else if(btn.textContent===chosen&&chosen!==correct)btn.classList.add("wrong");});
  const blank=document.getElementById("blankSpan");if(blank){blank.style.color="";blank.classList.add("revealed");}
  const fb=document.getElementById("quizFeedback");
  fb.textContent=chosen===correct?"✓ 正解！":`✗ 不正解。正解は「${correct}」です。`;
  fb.className="quiz-feedback show "+(chosen===correct?"ok":"ng");
  document.getElementById("scoreNum").textContent=quizScore;
  document.getElementById("scoreDen").textContent=quizTotal;
  document.getElementById("progressBar").style.width=(quizTotal?(quizScore/quizTotal)*100:0)+"%";
  document.getElementById("progressLabel").textContent=`Quiz: ${quizScore}/${quizTotal}`;
}

// ── RENDER COLLOCATIONS ──
function loadCollocations(verbName){
  const body=document.getElementById("collBody");
  body.innerHTML="";
  const data=COLLOCATIONS[verbName];
  if(!data||!data.length){
    body.innerHTML='<p style="color:var(--muted);font-size:.82rem;font-style:italic">コロケーションデータは準備中です。</p>';
    return;
  }
  data.forEach(group=>{
    const g=document.createElement("div");g.className="coll-group";
    const lbl=document.createElement("div");lbl.className="coll-group-label";lbl.textContent=group.type;
    g.appendChild(lbl);
    const items=document.createElement("div");items.className="coll-items";
    group.items.forEach(item=>{
      const row=document.createElement("div");row.className="coll-row";
      row.innerHTML=`<div class="coll-texts">
        <div class="coll-phrase">${item.phrase}</div>
        <div class="coll-meaning">${esc(item.meaning)}</div>
        <div class="coll-example">"${esc(item.example)}"</div>
      </div><button class="speak-btn" style="font-size:.7rem;padding:4px 9px;flex-shrink:0">🔊</button>`;
      row.querySelector(".speak-btn").addEventListener("click",()=>speak(item.example));
      items.appendChild(row);
    });
    g.appendChild(items);
    body.appendChild(g);
  });
}

    {word:"may",type:"助動詞",meaning:"〜してもよい（許可） / 〜かもしれない",usages:[{label:"許可（フォーマル）",examples:[{en:"May I come in?",jp:"入ってもよろしいですか？"},{en:"You may leave now.",jp:"もう退出してよろしいです。"}]},{label:"可能性（50%）",examples:[{en:"She may be late.",jp:"彼女は遅れるかもしれない。"},{en:"It may rain tonight.",jp:"今夜雨が降るかもしれない。"}]}],note:"canより丁寧な許可。mightはより不確か（30〜40%）。"},
    {word:"might",type:"助動詞",meaning:"〜かもしれない（低確率） / 〜してもよい",usages:[{label:"弱い可能性",examples:[{en:"She might come tomorrow.",jp:"彼女は明日来るかもしれない。"},{en:"It might be true.",jp:"本当かもしれない。"}]},{label:"控えめな提案",examples:[{en:"You might want to try this.",jp:"これを試してみてはどうですか。"},{en:"Might I suggest something?",jp:"何か提案してもよろしいでしょうか？"}]}],note:"mayより確信度が低い（30〜40%）。フォーマルな提案にも使う。"},
    {word:"be able to",type:"助動詞相当",meaning:"〜することができる（canの代用）",usages:[{label:"能力・可能（全時制）",examples:[{en:"She was able to finish on time.",jp:"彼女は時間通りに終えることができた。"},{en:"I'll be able to help you tomorrow.",jp:"明日手伝えます。"}]}],note:"canは現在形のみ。過去や未来の「できる」はbe able toを使う。"},
  ],
  "義務・必要":[
    {word:"must",type:"助動詞",meaning:"〜しなければならない / 〜に違いない",usages:[{label:"強い義務",examples:[{en:"You must wear a seatbelt.",jp:"シートベルトをしなければならない。"},{en:"Students must submit by Friday.",jp:"学生は金曜日までに提出しなければならない。"}]},{label:"強い推量",examples:[{en:"She must be tired.",jp:"彼女は疲れているに違いない。"},{en:"He must have left already.",jp:"彼はもう出発したに違いない。"}]}],note:"義務のmustは主観的（自分の判断）。推量のmustは確信度90%以上。"},
    {word:"have to",type:"助動詞相当",meaning:"〜しなければならない（外部の義務）",usages:[{label:"外部の義務・必要",examples:[{en:"I have to go to work.",jp:"仕事に行かなければならない。"},{en:"She has to take medicine.",jp:"彼女は薬を飲まなければならない。"}]}],note:"mustは主観的・内的義務、have toは外部のルール・事情による義務。過去形はhad to。"},
    {word:"should",type:"助動詞",meaning:"〜すべきだ / 〜するはずだ",usages:[{label:"義務・推奨",examples:[{en:"You should see a doctor.",jp:"医者に診てもらうべきだ。"},{en:"She should study harder.",jp:"彼女はもっと一生懸命勉強すべきだ。"}]},{label:"期待・推量",examples:[{en:"She should be there by now.",jp:"今頃彼女はそこにいるはずだ。"},{en:"It should be easy.",jp:"それは簡単なはずだ。"}]}],note:"mustより弱い義務・推薦。ought toと同義だが、shouldの方が一般的。"},
    {word:"ought to",type:"助動詞",meaning:"〜すべきだ（道徳的義務）",usages:[{label:"道徳的義務・推薦",examples:[{en:"You ought to apologize.",jp:"謝るべきだ。"},{en:"She ought to be more careful.",jp:"彼女はもっと注意すべきだ。"}]}],note:"shouldと同義だがやや格式高い。否定はought not to / oughtn't to。"},
    {word:"need to",type:"助動詞相当",meaning:"〜する必要がある",usages:[{label:"必要性",examples:[{en:"I need to study more.",jp:"もっと勉強する必要がある。"},{en:"She needs to see a doctor.",jp:"彼女は医者に診てもらう必要がある。"}]}],note:"助動詞のneedはフォーマル（need not）。need toは一般動詞的に使う。"},
    {word:"had better",type:"助動詞相当",meaning:"〜した方がいい（警告のニュアンス）",usages:[{label:"強い推薦・警告",examples:[{en:"You had better hurry.",jp:"急いだ方がいいですよ。"},{en:"She had better not be late.",jp:"遅刻しない方がいい。"}]}],note:"shouldより強く、「さもないとまずい」の含意がある。縮約形：you'd better。"},
  ],
  "意志・推量・その他":[
    {word:"will",type:"助動詞",meaning:"〜するつもりだ / 〜だろう",usages:[{label:"意志・決意",examples:[{en:"I will help you.",jp:"手伝います。"},{en:"She will not give up.",jp:"彼女はあきらめないだろう。"}]},{label:"未来の予測",examples:[{en:"It will rain tomorrow.",jp:"明日は雨が降るだろう。"},{en:"She will be back soon.",jp:"彼女はすぐに戻るだろう。"}]}],note:"be going toは計画済みの未来、willはその場の意志や単純未来。"},
    {word:"would",type:"助動詞",meaning:"〜するだろう（仮定） / 〜したものだ（過去の習慣）",usages:[{label:"丁寧な依頼",examples:[{en:"Would you help me?",jp:"手伝っていただけますか？"},{en:"Would you like some tea?",jp:"お茶はいかがですか？"}]},{label:"仮定法",examples:[{en:"I would go if I had time.",jp:"時間があれば行くのに。"},{en:"What would you do?",jp:"あなたならどうしますか？"}]},{label:"過去の習慣",examples:[{en:"She would often sing.",jp:"彼女はよく歌ったものだ。"}]}],note:"willの過去形・丁寧形。仮定法でも多用される。"},
    {word:"shall",type:"助動詞",meaning:"〜しましょうか / 〜すべきだ（フォーマル）",usages:[{label:"申し出・提案",examples:[{en:"Shall I help you?",jp:"手伝いましょうか？"},{en:"Shall we go?",jp:"行きましょうか？"}]},{label:"義務（法律・フォーマル）",examples:[{en:"All members shall attend.",jp:"全メンバーは出席しなければならない。"}]}],note:"主にイギリス英語・フォーマルな表現。Shall I/we...?は申し出・提案に使う。"},
    {word:"used to",type:"助動詞相当",meaning:"かつて〜した（過去の習慣・状態）",usages:[{label:"過去の習慣",examples:[{en:"I used to live in Osaka.",jp:"かつて大阪に住んでいた。"},{en:"She used to play tennis.",jp:"彼女はかつてテニスをしていた。"}]},{label:"過去の状態",examples:[{en:"There used to be a park here.",jp:"かつてここに公園があった。"}]}],note:"wouldも過去の習慣を表せるが、「かつての状態」にはused toのみ使える。"},
    {word:"be going to",type:"助動詞相当",meaning:"〜するつもりだ / 〜しそうだ",usages:[{label:"計画・意図",examples:[{en:"I'm going to study tonight.",jp:"今夜勉強するつもりだ。"},{en:"She is going to quit.",jp:"彼女は辞めるつもりだ。"}]},{label:"予兆・確実な未来",examples:[{en:"Look at those clouds — it's going to rain.",jp:"あの雲を見て、雨が降りそうだ。"}]}],note:"willとの違い：be going toは事前の計画・予兆があるケース。"},
    {word:"would rather",type:"助動詞相当",meaning:"〜の方を好む / むしろ〜したい",usages:[{label:"好み・選択",examples:[{en:"I'd rather stay home.",jp:"むしろ家にいたい。"},{en:"She'd rather walk than drive.",jp:"彼女は車で行くより歩く方がいい。"}]}],note:"would rather A than B で「BよりAの方を好む」。"},
    {word:"be supposed to",type:"助動詞相当",meaning:"〜することになっている / 〜のはずだ",usages:[{label:"義務・規則・期待",examples:[{en:"You're supposed to wear a mask.",jp:"マスクを着用することになっている。"},{en:"She was supposed to call me.",jp:"彼女は電話することになっていた。"}]}],note:"「規則・約束・期待」を表す。be expected toと近い。"},
    {word:"dare",type:"助動詞相当",meaning:"あえて〜する / 〜する勇気がある",usages:[{label:"挑戦・勇気",examples:[{en:"How dare you say that!",jp:"よくもそんなことが言えるね！"},{en:"She dare not speak up.",jp:"彼女はあえて声を上げない。"}]}],note:"助動詞と一般動詞の2用法がある。How dare you!は怒りの表現として頻出。"},
    {word:"need",type:"助動詞",meaning:"〜する必要がある（助動詞用法）",usages:[{label:"必要性の否定・疑問",examples:[{en:"You needn't worry.",jp:"心配する必要はない。"},{en:"Need I say more?",jp:"これ以上言う必要がありますか？"}]}],note:"助動詞のneedは主に否定文・疑問文で使われる。肯定文ではneed toが一般的。"},
    {word:"be meant to",type:"助動詞相当",meaning:"〜することになっている / 〜のためのものだ",usages:[{label:"目的・運命",examples:[{en:"This button is meant to be pressed.",jp:"このボタンは押すためのものだ。"},{en:"We were meant to meet.",jp:"私たちは出会うべき運命だった。"}]}],note:"be supposed toと似るが、「運命・目的」のニュアンスが強い。"},
  ],
  "推量・可能性の程度":[
    {word:"must have",type:"助動詞+完了",meaning:"〜したに違いない（過去の強い推量）",usages:[{label:"過去の確信",examples:[{en:"She must have forgotten.",jp:"彼女は忘れたに違いない。"},{en:"He must have left already.",jp:"彼はもう出発したに違いない。"}]}],note:"過去への強い推量。確信度90%以上。"},
    {word:"may have",type:"助動詞+完了",meaning:"〜したかもしれない（過去の弱い推量）",usages:[{label:"過去の可能性",examples:[{en:"She may have missed the train.",jp:"彼女は電車に乗り遅れたかもしれない。"},{en:"He may have known about it.",jp:"彼はそれについて知っていたかもしれない。"}]}],note:"過去の可能性（50%程度）。might haveよりやや確信度が高い。"},
    {word:"might have",type:"助動詞+完了",meaning:"〜したかもしれない（過去・低確率）",usages:[{label:"過去の弱い可能性",examples:[{en:"She might have seen it.",jp:"彼女はそれを見たかもしれない。"},{en:"He might have been wrong.",jp:"彼は間違っていたかもしれない。"}]}],note:"過去の可能性（30〜40%）。後悔・批判のニュアンスにもなる。"},
    {word:"could have",type:"助動詞+完了",meaning:"〜できたはずなのに / 〜だったかもしれない",usages:[{label:"失われた可能性・後悔",examples:[{en:"You could have told me.",jp:"教えてくれればよかったのに。"},{en:"She could have been hurt.",jp:"彼女はけがをしていたかもしれない。"}]}],note:"「実際はしなかったが、できたはず」という後悔・批判に使う。"},
    {word:"should have",type:"助動詞+完了",meaning:"〜すべきだったのに（過去への後悔・批判）",usages:[{label:"後悔・批判",examples:[{en:"You should have called me.",jp:"電話すべきだったのに。"},{en:"She should have been more careful.",jp:"もっと注意すべきだった。"}]}],note:"過去の行動への後悔や他者への批判を表す。ought to haveと同義。"},
    {word:"would have",type:"助動詞+完了",meaning:"〜しただろう（仮定法過去完了）",usages:[{label:"仮定法過去完了",examples:[{en:"I would have come if I had known.",jp:"知っていたら来ていただろう。"},{en:"She would have passed if she had studied.",jp:"勉強していれば合格しただろう。"}]}],note:"if節（仮定法過去完了）と組み合わせて使う。"},
    {word:"can't have",type:"助動詞+完了",meaning:"〜したはずがない（過去の否定推量）",usages:[{label:"過去への否定推量",examples:[{en:"She can't have said that.",jp:"彼女がそんなことを言ったはずがない。"},{en:"He can't have finished already.",jp:"彼がもう終わったはずがない。"}]}],note:"couldn't haveと同義。過去への強い否定推量。"},
    {word:"needn't have",type:"助動詞+完了",meaning:"〜する必要はなかった（したが不要だった）",usages:[{label:"不必要だった過去の行動",examples:[{en:"You needn't have worried.",jp:"心配する必要はなかった。"},{en:"She needn't have bought so much.",jp:"そんなにたくさん買う必要はなかった。"}]}],note:"didn't need toとの違い：needn't haveは「実際にしたが不要だった」。"},
  ],
  "助動詞的表現":[
    {word:"be about to",type:"助動詞相当",meaning:"まさに〜しようとしている",usages:[{label:"直近の未来",examples:[{en:"She is about to leave.",jp:"彼女はまさに出発しようとしている。"},{en:"The show is about to start.",jp:"ショーがまさに始まろうとしている。"}]}],note:"「今まさに〜するところ」という直近の未来を表す。"},
    {word:"be due to",type:"助動詞相当",meaning:"〜する予定だ / 〜のはずだ",usages:[{label:"予定・期限",examples:[{en:"She is due to arrive at noon.",jp:"彼女は正午に到着する予定だ。"},{en:"The report is due tomorrow.",jp:"レポートは明日が締め切りだ。"}]}],note:"予定や締め切りを表す。due toが「原因」を表すのとは別用法。"},
    {word:"be likely to",type:"助動詞相当",meaning:"〜しそうだ / 〜する可能性が高い",usages:[{label:"高い可能性",examples:[{en:"It is likely to rain.",jp:"雨が降りそうだ。"},{en:"She is likely to succeed.",jp:"彼女は成功しそうだ。"}]}],note:"probablyと同義。unlikelyは反意語。"},
    {word:"be unlikely to",type:"助動詞相当",meaning:"〜しそうにない / 〜する可能性が低い",usages:[{label:"低い可能性",examples:[{en:"It is unlikely to snow.",jp:"雪が降りそうにない。"},{en:"He is unlikely to change.",jp:"彼は変わりそうにない。"}]}],note:"be likely toの反意語。"},
    {word:"be bound to",type:"助動詞相当",meaning:"必ず〜する / 〜するに決まっている",usages:[{label:"必然性",examples:[{en:"She is bound to succeed.",jp:"彼女は必ず成功する。"},{en:"It's bound to happen.",jp:"それは必ず起こる。"}]}],note:"「避けられない・必然的な」強いニュアンス。be sure toと近い。"},
    {word:"be certain to",type:"助動詞相当",meaning:"きっと〜する / 確実に〜する",usages:[{label:"確実性",examples:[{en:"She is certain to pass.",jp:"彼女はきっと合格する。"},{en:"It is certain to cause problems.",jp:"確実に問題を引き起こす。"}]}],note:"be bound toより少し確信度が低いが、同様に強い。"},
    {word:"had to",type:"助動詞過去",meaning:"〜しなければならなかった（have toの過去）",usages:[{label:"過去の義務",examples:[{en:"I had to stay late.",jp:"遅くまでいなければならなかった。"},{en:"She had to cancel her plans.",jp:"彼女は予定をキャンセルしなければならなかった。"}]}],note:"mustには過去形がないため、have toの過去形had toを代わりに使う。"},
    {word:"will have to",type:"助動詞",meaning:"〜しなければならないだろう（未来の義務）",usages:[{label:"未来の義務",examples:[{en:"You will have to wait.",jp:"待たなければならないだろう。"},{en:"She will have to decide soon.",jp:"彼女はすぐに決めなければならないだろう。"}]}],note:"mustの未来形として使う。"},
    {word:"ought to have",type:"助動詞+完了",meaning:"〜すべきだったのに（should haveと同義）",usages:[{label:"過去への後悔",examples:[{en:"You ought to have apologized.",jp:"謝るべきだった。"},{en:"She ought to have been more careful.",jp:"もっと注意すべきだった。"}]}],note:"should haveと同義。やや格式高い。"},
    {word:"be able to have",type:"助動詞相当",meaning:"〜できたはずだ（過去の能力・可能性）",usages:[{label:"過去の可能性",examples:[{en:"She was able to finish on time.",jp:"彼女は時間通りに終えることができた。"},{en:"They were able to solve the problem.",jp:"彼らは問題を解決することができた。"}]}],note:"could haveと似るが、「実際にできた」ことを示す場合に使う。"},
    {word:"cannot but",type:"助動詞相当",meaning:"〜せずにはいられない",usages:[{label:"不可避",examples:[{en:"I cannot but admire her.",jp:"彼女を称賛せずにはいられない。"},{en:"She cannot but agree.",jp:"彼女は同意せずにはいられない。"}]}],note:"can't help doingと同義。フォーマルな表現。"},
    {word:"may well",type:"助動詞",meaning:"〜するのももっともだ / おそらく〜だろう",usages:[{label:"正当性・高い可能性",examples:[{en:"You may well be right.",jp:"あなたが正しいのももっともだ。"},{en:"She may well refuse.",jp:"彼女がおそらく断るだろう。"}]}],note:"「〜するのは当然だ」または「おそらく〜」の2つの意味がある。"},
    {word:"might as well",type:"助動詞",meaning:"〜してもよい / 〜した方がいい（消極的）",usages:[{label:"消極的な推薦",examples:[{en:"We might as well wait.",jp:"待った方がいいかもしれない（どうせなら）。"},{en:"You might as well try.",jp:"どうせなら試してみたら。"}]}],note:"「他に良い選択肢がないので〜しよう」というニュアンス。"},
    {word:"would like to",type:"助動詞相当",meaning:"〜したいと思う（丁寧な希望）",usages:[{label:"丁寧な希望",examples:[{en:"I would like to apply.",jp:"応募したいと思います。"},{en:"Would you like to join us?",jp:"一緒にいかがですか？"}]}],note:"want toより丁寧。フォーマルな場面や礼儀正しい表現に使う。"},
    {word:"would love to",type:"助動詞相当",meaning:"ぜひ〜したい（熱意のある希望）",usages:[{label:"強い希望・熱意",examples:[{en:"I would love to visit Japan.",jp:"ぜひ日本を訪れたい。"},{en:"She'd love to help.",jp:"ぜひ手伝いたいと思っている。"}]}],note:"would like toより感情的・熱意がある。"},
    {word:"would mind",type:"助動詞相当",meaning:"〜していただけますか（丁寧な依頼）",usages:[{label:"丁寧な依頼",examples:[{en:"Would you mind opening the window?",jp:"窓を開けていただけますか？"},{en:"Would you mind if I sat here?",jp:"ここに座ってもよろしいですか？"}]}],note:"否定で答えると「いいですよ」になる。No, I don't mind. = どうぞ。"},
    {word:"should have been",type:"助動詞+完了進行",meaning:"〜だったはずなのに / 〜すべきだった",usages:[{label:"過去の期待外れ",examples:[{en:"She should have been here by now.",jp:"今頃彼女はここにいるはずだったのに。"},{en:"This should have been finished.",jp:"これは終わっていなければならなかった。"}]}],note:"期待と異なる結果への失望を表す。"},
    {word:"must not",type:"助動詞否定",meaning:"〜してはいけない（強い禁止）",usages:[{label:"禁止",examples:[{en:"You must not smoke here.",jp:"ここでタバコを吸ってはいけない。"},{en:"Students must not cheat.",jp:"学生は不正行為をしてはいけない。"}]}],note:"don't have toは「する必要がない」で禁止ではない。混同注意。"},
    {word:"don't have to",type:"助動詞相当否定",meaning:"〜する必要はない（禁止ではない）",usages:[{label:"不必要",examples:[{en:"You don't have to come.",jp:"来る必要はない。"},{en:"She doesn't have to work on weekends.",jp:"彼女は週末に働く必要はない。"}]}],note:"must notは禁止。don't have toは「してもしなくてもよい」。"},
    {word:"be willing to",type:"助動詞相当",meaning:"進んで〜する / 〜する意志がある",usages:[{label:"意志・積極性",examples:[{en:"She is willing to help.",jp:"彼女は進んで手伝う。"},{en:"Are you willing to try?",jp:"やってみる意志はありますか？"}]}],note:"will（単純な意志）より「積極的な意思」のニュアンスが強い。"},
    {word:"be reluctant to",type:"助動詞相当",meaning:"〜するのを嫌がる / 乗り気でない",usages:[{label:"消極的意志",examples:[{en:"He is reluctant to admit it.",jp:"彼はそれを認めたがらない。"},{en:"She was reluctant to leave.",jp:"彼女は去ることに乗り気でなかった。"}]}],note:"be willing toの反意語。"},

// ── GENERIC GRAM SECTION FACTORY ──
function makeGramSection(cfg){
  // cfg: {catData, navId, gridId, prevId, nextId, pagerId, mainId,
  //       wordId, meaningId, typeId, speakId, bodyId,
  //       catTabsId, color, typeLabel}
  const catKeys=Object.keys(cfg.catData);
  let activeCat=catKeys[0], currentIdx=0;
  const catTabs=document.getElementById(cfg.catTabsId);
  const grid=document.getElementById(cfg.gridId);
  const prevBtn=document.getElementById(cfg.prevId);
  const nextBtn=document.getElementById(cfg.nextId);
  const pagerInfo=document.getElementById(cfg.pagerId);
  const c=cfg.color;

  // style the cat-tabs dynamically
  catTabs.style.setProperty('--gram-color', c);

  function currentList(){return cfg.catData[activeCat]||[];}

  function updatePager(){
    const l=currentList().length;
    prevBtn.disabled=currentIdx===0;
    nextBtn.disabled=currentIdx===l-1;
    pagerInfo.textContent=(currentIdx+1)+"/"+l;
  }

  function renderCats(){
    catTabs.innerHTML="";
    catKeys.forEach(cat=>{
      const btn=document.createElement("button");
      btn.className="gram-cat-tab";
      btn.style.cssText=cat===activeCat?`background:${c};border-color:${c};color:#fff`:``;
      btn.textContent=cat;
      btn.addEventListener("click",()=>{
        activeCat=cat;currentIdx=0;renderCats();renderGrid();loadItem();
      });
      catTabs.appendChild(btn);
    });
  }

  function renderGrid(){
    grid.innerHTML="";
    currentList().forEach((item,i)=>{
      const btn=document.createElement("button");
      btn.className="gram-btn";
      btn.style.cssText=i===currentIdx?`background:${c};border-color:${c};color:#fff`:``;
      btn.textContent=item.word;
      btn.addEventListener("click",()=>{currentIdx=i;renderGrid();loadItem();});
      grid.appendChild(btn);
    });
    updatePager();
  }

  function loadItem(){
    const item=currentList()[currentIdx];
    if(!item)return;
    document.getElementById(cfg.wordId).textContent=item.word;
    document.getElementById(cfg.wordId).style.color=c;
    document.getElementById(cfg.meaningId).textContent=item.meaning;
    const tb=document.getElementById(cfg.typeId);
    tb.textContent=item.type;
    tb.style.cssText=`background:${c}22;border-color:${c}55;color:${c}`;
    document.getElementById(cfg.speakId).onclick=()=>speak(item.word);
    const body=document.getElementById(cfg.bodyId);
    body.innerHTML="";
    item.usages.forEach(u=>{
      const g=document.createElement("div");g.className="gram-usage-group";
      const lbl=document.createElement("div");lbl.className="gram-usage-label";
      lbl.style.color=c;lbl.textContent=u.label;
      g.appendChild(lbl);
      u.examples.forEach(ex=>{
        const row=document.createElement("div");row.className="gram-ex-row";
        row.innerHTML=`<div class="gram-ex-texts"><div class="gram-ex-en">${esc(ex.en)}</div><div class="gram-ex-jp">${esc(ex.jp)}</div></div><button class="speak-btn" style="font-size:.7rem;padding:4px 9px;flex-shrink:0">🔊</button>`;
        row.querySelector(".speak-btn").addEventListener("click",()=>speak(ex.en));
        g.appendChild(row);
      });
      body.appendChild(g);
    });
    if(item.note){
      const n=document.createElement("div");n.className="gram-note";
      n.style.cssText=`border-left-color:${c};background:${c}11;color:${c}`;
      n.textContent="📌 "+item.note;body.appendChild(n);
    }
    renderGrid();
  }

  prevBtn.addEventListener("click",()=>{if(currentIdx>0){currentIdx--;renderGrid();loadItem();}});
  nextBtn.addEventListener("click",()=>{const l=currentList().length;if(currentIdx<l-1){currentIdx++;renderGrid();loadItem();}});

  renderCats();renderGrid();loadItem();
  return {loadFirst:()=>{currentIdx=0;activeCat=catKeys[0];renderCats();renderGrid();loadItem();}};
}

// ── UPDATED MODE SWITCH ──
function initModeSwitch(){
  const allModes=[
    {btn:"modeVerbBtn",  nav:"verbNavWrap",  main:"verbMainWrap",  cls:"active",        activeClass:"active"},
    {btn:"modePrepBtn",  nav:"prepNavWrap",  main:"prepMainWrap",  cls:"prep-active",   activeClass:"prep-active"},
    {btn:"modeConjBtn",  nav:"conjNavWrap",  main:"conjMainWrap",  cls:"conj-active",   activeClass:"conj-active"},
    {btn:"modeAdvBtn",   nav:"advNavWrap",   main:"advMainWrap",   cls:"adv-active",    activeClass:"adv-active"},
    {btn:"modeModalBtn", nav:"modalNavWrap", main:"modalMainWrap", cls:"modal-active",  activeClass:"modal-active"},
  ];
  function setMode(target){
    allModes.forEach(m=>{
      const btn=document.getElementById(m.btn);
      const nav=document.getElementById(m.nav);
      const main=document.getElementById(m.main);
      if(m.btn===target){
        btn.classList.add(m.activeClass);
        nav.classList.remove("hidden");
        main.classList.remove("hidden");
      } else {
        btn.classList.remove("active","prep-active","conj-active","adv-active","modal-active");
        nav.classList.add("hidden");
        main.classList.add("hidden");
      }
    });
  }
  allModes.forEach(m=>{
    document.getElementById(m.btn).addEventListener("click",()=>setMode(m.btn));
  });
}

    {word:"into",type:"一語",meaning:"〜の中へ（動き・変化）",usages:[{label:"動き・侵入",examples:[{en:"She walked into the room.",jp:"彼女は部屋に入った。"},{en:"He fell into the water.",jp:"彼は水に落ちた。"}]},{label:"変化・転換",examples:[{en:"Water turned into ice.",jp:"水が氷になった。"},{en:"She translated it into Japanese.",jp:"彼女はそれを日本語に翻訳した。"}]},{label:"関与・深まり",examples:[{en:"She is into yoga.",jp:"彼女はヨガに夢中だ。"},{en:"Let's get into the details.",jp:"詳細に入りましょう。"}]}],note:"inが「内側の状態」に対し、intoは「外から内への動き」を表す。"},
    {word:"across",type:"一語",meaning:"〜を横切って / 〜の向こう側に",usages:[{label:"横断",examples:[{en:"She walked across the bridge.",jp:"彼女は橋を渡った。"},{en:"Run across the street.",jp:"通りを横切って。"}]},{label:"反対側",examples:[{en:"He lives across the street.",jp:"彼は通りの向こうに住んでいる。"},{en:"Across the world.",jp:"世界中で。"}]}],note:"「幅のあるものを横切る」動作や「向こう側」を表す。"},
    {word:"along",type:"一語",meaning:"〜に沿って / 〜を進んで",usages:[{label:"沿って進む",examples:[{en:"Walk along the river.",jp:"川に沿って歩く。"},{en:"Drive along the coast.",jp:"海岸沿いに走る。"}]},{label:"一緒に",examples:[{en:"Bring your friend along.",jp:"友達も連れてきて。"},{en:"Come along with us.",jp:"私たちと一緒に来て。"}]}],note:"「線に沿って移動」か「一緒に」の意味で使われる。"},
    {word:"beside",type:"一語",meaning:"〜のそばに / 〜と並んで",usages:[{label:"隣・横",examples:[{en:"Sit beside me.",jp:"私のそばに座って。"},{en:"The hotel is beside the lake.",jp:"ホテルは湖のそばにある。"}]},{label:"比較（beside the point）",examples:[{en:"That's beside the point.",jp:"それは的外れだ。"},{en:"Beside that, what else?",jp:"それに加えて、他には？"}]}],note:"byと似るが、byより「隣接・並列」のニュアンスが強い。"},
  ],
  "二語・三語前置詞": [
    {word:"because of",type:"二語",meaning:"〜のために / 〜が原因で",usages:[{label:"原因・理由",examples:[{en:"She was late because of the traffic.",jp:"彼女は渋滞のせいで遅れた。"},{en:"Because of the rain, we stayed home.",jp:"雨のため、私たちは家にいた。"}]}],note:"due toと同義だが、よりカジュアル。sinceやasは節を導くが、because ofは名詞句の前に置く。"},
    {word:"due to",type:"二語",meaning:"〜のために / 〜が原因で（公式）",usages:[{label:"原因・理由（フォーマル）",examples:[{en:"The flight was delayed due to weather.",jp:"フライトは天候のため遅延した。"},{en:"Due to budget cuts, the project was cancelled.",jp:"予算削減のため、プロジェクトは中止された。"}]}],note:"because ofよりフォーマル。ビジネス文書でよく使われる。"},
    {word:"according to",type:"三語",meaning:"〜によれば / 〜に従って",usages:[{label:"情報源",examples:[{en:"According to the report, sales increased.",jp:"報告書によれば、売上が増加した。"},{en:"According to her, he was there.",jp:"彼女によれば、彼はそこにいた。"}]},{label:"基準・規則",examples:[{en:"Act according to the rules.",jp:"ルールに従って行動して。"},{en:"Everything went according to plan.",jp:"すべて計画通りに進んだ。"}]}],note:"自分の意見には使えない（×according to me）。情報源や基準を示す。"},
    {word:"instead of",type:"三語",meaning:"〜の代わりに",usages:[{label:"代替",examples:[{en:"Use honey instead of sugar.",jp:"砂糖の代わりにはちみつを使って。"},{en:"She walked instead of taking the bus.",jp:"彼女はバスに乗る代わりに歩いた。"}]}],note:"「Aの代わりにB」という置き換えを表す。"},
    {word:"in spite of",type:"三語",meaning:"〜にもかかわらず",usages:[{label:"逆接",examples:[{en:"In spite of the rain, she went out.",jp:"雨にもかかわらず彼女は出かけた。"},{en:"He succeeded in spite of the difficulties.",jp:"困難にもかかわらず彼は成功した。"}]}],note:"despite と同義。後ろには名詞・動名詞が来る（節は不可）。"},
    {word:"in front of",type:"三語",meaning:"〜の前に（位置）",usages:[{label:"場所",examples:[{en:"She stood in front of the mirror.",jp:"彼女は鏡の前に立った。"},{en:"The car is parked in front of the house.",jp:"車が家の前に駐車している。"}]}],note:"behindの反対。「正面の前」を表し、「前方」のbeforeとは異なる。"},
    {word:"in addition to",type:"三語",meaning:"〜に加えて",usages:[{label:"追加",examples:[{en:"In addition to English, she speaks French.",jp:"英語に加えて、彼女はフランス語も話す。"},{en:"In addition to the salary, there are benefits.",jp:"給料に加えて、福利厚生がある。"}]}],note:"besides と似るが、よりフォーマル。"},
    {word:"as well as",type:"三語",meaning:"〜と同様に / 〜も",usages:[{label:"追加・同様",examples:[{en:"She speaks English as well as French.",jp:"彼女は英語と同様フランス語も話す。"},{en:"He is a teacher as well as a writer.",jp:"彼は教師であり作家でもある。"}]}],note:"andより「同様に」のニュアンスが強い。"},
    {word:"in terms of",type:"三語",meaning:"〜の点で / 〜に関して言えば",usages:[{label:"観点・基準",examples:[{en:"In terms of cost, it's the best option.",jp:"コストの点では、それが最良の選択だ。"},{en:"What does it mean in terms of time?",jp:"時間の面ではどういう意味ですか？"}]}],note:"特定の観点や基準を示す表現。ビジネスや学術で頻出。"},
    {word:"with regard to",type:"三語",meaning:"〜に関して（フォーマル）",usages:[{label:"話題・関連",examples:[{en:"With regard to your question, here is the answer.",jp:"あなたの質問に関して、回答はこちらです。"},{en:"With regard to the budget, we need to cut costs.",jp:"予算に関しては、コストを削減する必要がある。"}]}],note:"regarding / concerning / as for と同義。フォーマルな文書でよく使われる。"},
    {word:"on behalf of",type:"三語",meaning:"〜を代表して / 〜のために",usages:[{label:"代理・代表",examples:[{en:"I'm speaking on behalf of the team.",jp:"チームを代表して話しています。"},{en:"She accepted the award on behalf of her colleague.",jp:"彼女は同僚を代理して賞を受け取った。"}]}],note:"代理・代表を示す表現。フォーマルな場面で使われる。"},
    {word:"in case of",type:"三語",meaning:"〜の場合には / 〜に備えて",usages:[{label:"条件・備え",examples:[{en:"In case of emergency, call 911.",jp:"緊急の場合は911に電話して。"},{en:"Keep an umbrella in case of rain.",jp:"雨に備えて傘を持って。"}]}],note:"仮定的な状況への備えを表す。in case that（節）との区別に注意。"},
    {word:"as a result of",type:"三語",meaning:"〜の結果として",usages:[{label:"結果・因果",examples:[{en:"As a result of hard work, she succeeded.",jp:"努力の結果、彼女は成功した。"},{en:"The delay was as a result of the storm.",jp:"遅延は嵐の結果だった。"}]}],note:"because ofより「結果」のニュアンスが強い。フォーマルな場面で使われる。"},
    {word:"in order to",type:"三語",meaning:"〜するために（目的）",usages:[{label:"目的",examples:[{en:"She studied hard in order to pass.",jp:"合格するために一生懸命勉強した。"},{en:"In order to succeed, you must work hard.",jp:"成功するために、一生懸命働かなければならない。"}]}],note:"to不定詞と同義だが、より明確に目的を示す。文頭に置くことが多い。"},
    {word:"apart from",type:"二語",meaning:"〜を除いて / 〜に加えて",usages:[{label:"除外",examples:[{en:"Apart from that, everything is fine.",jp:"それを除けば、すべて順調だ。"},{en:"Apart from English, she speaks Chinese.",jp:"英語の他に、彼女は中国語も話す。"}]}],note:"「除外」と「追加」の両方の意味を持つ。文脈で判断する。"},
  ],
};

const prepCatKeys=Object.keys(PREP_CATS);
let activePrepCat=prepCatKeys[0];
let currentPrepIdx=0;

function initPrepNav(){
  const catTabs=document.getElementById("prepCatTabs");
  const grid=document.getElementById("prepGrid");
  const prevBtn=document.getElementById("prepPrevBtn");
  const nextBtn=document.getElementById("prepNextBtn");
  const pagerInfo=document.getElementById("prepPagerInfo");

  function currentList(){return PREP_CATS[activePrepCat]||[];}

  function updatePager(){
    const list=currentList();
    prevBtn.disabled=currentPrepIdx===0;
    nextBtn.disabled=currentPrepIdx===list.length-1;
    pagerInfo.textContent=(currentPrepIdx+1)+"/"+list.length;
  }

  function renderCats(){
    catTabs.innerHTML="";
    prepCatKeys.forEach(cat=>{
      const btn=document.createElement("button");
      btn.className="prep-cat-tab"+(cat===activePrepCat?" active":"");
      btn.textContent=cat;
      btn.addEventListener("click",()=>{activePrepCat=cat;currentPrepIdx=0;renderCats();renderGrid();loadPrep();});
      catTabs.appendChild(btn);
    });
  }

  function renderGrid(){
    grid.innerHTML="";
    currentList().forEach((p,i)=>{
      const btn=document.createElement("button");
      btn.className="prep-btn"+(i===currentPrepIdx?" active":"");
      btn.textContent=p.word;
      btn.addEventListener("click",()=>{currentPrepIdx=i;renderGrid();loadPrep();});
      grid.appendChild(btn);
    });
    updatePager();
  }

  function loadPrep(){
    const p=currentList()[currentPrepIdx];
    if(!p)return;
    document.getElementById("prepWord").textContent=p.word;
    document.getElementById("prepMeaning").textContent=p.meaning;
    document.getElementById("prepTypeBadge").textContent=p.type+"前置詞";
    document.getElementById("prepSpeakBtn").onclick=()=>speak(p.word);
    const body=document.getElementById("prepCardBody");
    body.innerHTML="";
    p.usages.forEach(u=>{
      const g=document.createElement("div");g.className="prep-usage-group";
      g.innerHTML=`<div class="prep-usage-label">${esc(u.label)}</div>`;
      u.examples.forEach(ex=>{
        const row=document.createElement("div");row.className="prep-ex-row";
        row.innerHTML=`<div class="prep-ex-texts"><div class="prep-ex-en">${esc(ex.en)}</div><div class="prep-ex-jp">${esc(ex.jp)}</div></div><button class="speak-btn" style="font-size:.7rem;padding:4px 9px;flex-shrink:0">🔊</button>`;
        row.querySelector(".speak-btn").addEventListener("click",()=>speak(ex.en));
        g.appendChild(row);
      });
      body.appendChild(g);
    });
    if(p.note){const n=document.createElement("div");n.className="prep-note";n.textContent="📌 "+p.note;body.appendChild(n);}
    renderGrid();
  }

  prevBtn.addEventListener("click",()=>{if(currentPrepIdx>0){currentPrepIdx--;renderGrid();loadPrep();}});
  nextBtn.addEventListener("click",()=>{const list=currentList();if(currentPrepIdx<list.length-1){currentPrepIdx++;renderGrid();loadPrep();}});
  document.addEventListener("keydown",e=>{
    if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
    if(!document.getElementById("prepMainWrap").classList.contains("hidden")){
      if(e.key==="ArrowLeft"&&!prevBtn.disabled)prevBtn.click();
      if(e.key==="ArrowRight"&&!nextBtn.disabled)nextBtn.click();
    }
  });

  renderCats();renderGrid();loadPrep();
}

function initModeSwitch(){
  const verbBtn=document.getElementById("modeVerbBtn");
  const prepBtn=document.getElementById("modePrepBtn");
  const verbNav=document.getElementById("verbNavWrap");
  const prepNav=document.getElementById("prepNavWrap");
  const verbMain=document.getElementById("verbMainWrap");
  const prepMain=document.getElementById("prepMainWrap");

  function setMode(mode){
    if(mode==="verb"){
      verbBtn.classList.add("active");verbBtn.classList.remove("prep-active");
      prepBtn.classList.remove("active","prep-active");
      verbNav.classList.remove("hidden");prepNav.classList.add("hidden");
      verbMain.classList.remove("hidden");prepMain.classList.add("hidden");
    } else {
      prepBtn.classList.add("active","prep-active");
      verbBtn.classList.remove("active","prep-active");
      prepNav.classList.remove("hidden");verbNav.classList.add("hidden");
      prepMain.classList.remove("hidden");verbMain.classList.add("hidden");
    }
  }
  verbBtn.addEventListener("click",()=>setMode("verb"));
  prepBtn.addEventListener("click",()=>setMode("prep"));
}

window.addEventListener("DOMContentLoaded",()=>{
  initNav();loadVerb(currentVerb);buildQuizPool();loadQuiz();
  initPrepNav();
  makeGramSection({catData:CONJ_DATA,catTabsId:"conjCatTabs",gridId:"conjGrid",prevId:"conjPrevBtn",nextId:"conjNextBtn",pagerId:"conjPagerInfo",wordId:"conjWord",meaningId:"conjMeaning",typeId:"conjTypeBadge",speakId:"conjSpeakBtn",bodyId:"conjCardBody",color:"#9b7fa3"});
  makeGramSection({catData:ADV_DATA,catTabsId:"advCatTabs",gridId:"advGrid",prevId:"advPrevBtn",nextId:"advNextBtn",pagerId:"advPagerInfo",wordId:"advWord",meaningId:"advMeaning",typeId:"advTypeBadge",speakId:"advSpeakBtn",bodyId:"advCardBody",color:"#e8a87c"});
  makeGramSection({catData:MODAL_DATA,catTabsId:"modalCatTabs",gridId:"modalGrid",prevId:"modalPrevBtn",nextId:"modalNextBtn",pagerId:"modalPagerInfo",wordId:"modalWord",meaningId:"modalMeaning",typeId:"modalTypeBadge",speakId:"modalSpeakBtn",bodyId:"modalCardBody",color:"#5ba3a0"});
  initModeSwitch();
  document.getElementById("nextQuizBtn").addEventListener("click",()=>{quizIndex=(quizIndex+1)%quizPool.length;loadQuiz();});
  document.getElementById("resetQuizBtn").addEventListener("click",()=>{quizScore=0;quizTotal=0;quizIndex=0;quizPool=shuffle(quizPool);document.getElementById("scoreNum").textContent=0;document.getElementById("scoreDen").textContent=0;document.getElementById("progressBar").style.width="0%";document.getElementById("progressLabel").textContent="Quiz: 0/0";loadQuiz();});
  // Service Worker登録
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").then(()=>{
      console.log("VerbLab: Service Worker registered");
    }).catch(err=>console.warn("SW registration failed:", err));
  }
});
</script>
